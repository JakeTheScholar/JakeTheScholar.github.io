name: Deploy static site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Copy only static files for deployment
        run: |
          mkdir -p _site

          # Root static files
          cp -f index.html projects.html services.html jake.html vendor-matrix.html favicon.svg headshot.jpg CNAME robots.txt sitemap.xml _site/ 2>/dev/null || true
          # Responsive hero images (WebP + JPEG at 400/600/900w)
          cp -f headshot-400.jpg headshot-600.jpg headshot-900.jpg _site/ 2>/dev/null || true
          cp -f headshot-400.webp headshot-600.webp headshot-900.webp _site/ 2>/dev/null || true

          # Agent Farm — frontend only (no server/)
          mkdir -p _site/agent-farm/js
          cp agent-farm/index.html _site/agent-farm/
          cp agent-farm/js/*.js _site/agent-farm/js/

          # Franchise Command Center — frontend only (no test.html)
          mkdir -p _site/franchise-command-center/js
          cp franchise-command-center/index.html _site/franchise-command-center/
          cp franchise-command-center/js/*.js _site/franchise-command-center/js/

          # Property Scout — built dist only (no server.js, no source)
          mkdir -p _site/property-scout/client/dist/assets
          cp property-scout/client/dist/index.html _site/property-scout/client/dist/
          cp property-scout/client/dist/assets/* _site/property-scout/client/dist/assets/

          # Vendor Comparison Matrix — frontend only
          mkdir -p _site/vendor-comparison-matrix
          cp vendor-comparison-matrix/index.html _site/vendor-comparison-matrix/

          # Trading Command Center — frontend only (no server/, no test.html)
          mkdir -p _site/trading-command-center/js
          cp trading-command-center/index.html _site/trading-command-center/
          cp -r trading-command-center/js/*.js _site/trading-command-center/js/ 2>/dev/null || true

          # Economic Indicator Engine — frontend only
          mkdir -p _site/economic-indicators/js _site/economic-indicators/data
          cp economic-indicators/index.html _site/economic-indicators/
          cp economic-indicators/js/*.js _site/economic-indicators/js/
          cp economic-indicators/data/*.json _site/economic-indicators/data/

          # Threat Intelligence Dashboard — frontend only (proxy deploys separately)
          mkdir -p _site/threat-intel-dashboard/js _site/threat-intel-dashboard/data
          cp threat-intel-dashboard/index.html _site/threat-intel-dashboard/
          cp threat-intel-dashboard/js/*.js _site/threat-intel-dashboard/js/
          cp threat-intel-dashboard/data/*.json _site/threat-intel-dashboard/data/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
