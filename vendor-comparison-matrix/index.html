<style>
  *{box-sizing:border-box}

  /* Section buttons */
  .section-btn{text-align:left;padding:10px 14px;border-radius:10px;font-size:13px;border:1.5px solid transparent;cursor:pointer;transition:all .2s cubic-bezier(.4,0,.2,1)}

  .section-btn:not(.selected):hover{background:#f1f5f9;border-color:#cbd5e1;color:#475569}

  /* Custom scrollbar */
  ::-webkit-scrollbar{width:6px}

  ::-webkit-scrollbar-thumb:hover{background:#94a3b8}

  /* Progress bar animation */
  .bar-fill{transition:width .6s cubic-bezier(.4,0,.2,1)}

  /* AI score pill (read-only) */
  .ai-pill{display:inline-flex;align-items:center;justify-content:center;width:34px;height:34px;border-radius:8px;font-weight:700;font-size:13px;background:linear-gradient(135deg,#e0e7ff,#c7d2fe);color:#4338ca;border:1.5px solid #a5b4fc}
  .user-pill{display:inline-flex;align-items:center;justify-content:center;width:34px;height:34px;border-radius:8px;font-weight:700;font-size:13px;background:#f1f5f9;color:#94a3b8;border:1.5px solid #e2e8f0}

  /* Mobile sidebar */
  @media(max-width:767px){
    #sidebar{position:fixed;left:0;top:0;bottom:0;z-index:50;transform:translateX(-100%);transition:transform .25s ease}
    #sidebar.open{transform:translateX(0)}
    #sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:40}
    #sidebar-overlay.open{display:block}
    #mobile-header{display:flex!important}
  }
  @media(min-width:768px){
    #sidebar-overlay,#mobile-header{display:none!important}
  }
</style>

<script>
"use strict";

// ── Mobile sidebar toggle ─────────────────────────────────────────────
function openSidebar() {
  document.getElementById('sidebar').classList.add('open');
  document.getElementById('sidebar-overlay').classList.add('open');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebar-overlay').classList.remove('open');
}
document.addEventListener('DOMContentLoaded', () => {
  const btn = document.getElementById('menu-btn');
  if (btn) btn.addEventListener('click', openSidebar);
});

// ── Data Layer (localStorage) ──────────────────────────────────────────
const Store = {
  _get(key) { try { return JSON.parse(localStorage.getItem('vm_' + key)) || []; } catch { return []; } },
  _set(key, val) { localStorage.setItem('vm_' + key, JSON.stringify(val)); },
  _nextId(key) {
    const counter = 'vm_id_' + key;
    const id = (parseInt(localStorage.getItem(counter) || '0', 10)) + 1;
    localStorage.setItem(counter, String(id));
    return id;
  },

  // Vendors
  getVendors() { return this._get('vendors'); },
  getVendor(id) { return this.getVendors().find(v => v.id === id) || null; },
  saveVendor(data) {
    const vendors = this.getVendors();
    if (data.id) {
      const i = vendors.findIndex(v => v.id === data.id);
      if (i >= 0) vendors[i] = { ...vendors[i], ...data, updatedAt: Date.now() };
    } else {
      data.id = this._nextId('vendors');
      data.createdAt = Date.now();
      data.updatedAt = Date.now();
      vendors.push(data);
    }
    this._set('vendors', vendors);
    return data;
  },
  deleteVendor(id) {
    this._set('vendors', this.getVendors().filter(v => v.id !== id));
    this._set('scores', this._get('scores').filter(s => s.vendorId !== id));
    this._set('ai_scores', this._get('ai_scores').filter(s => s.vendorId !== id));
    this._set('bbp_ai_scores', this._get('bbp_ai_scores').filter(s => s.vendorId !== id));
    this._set('bbp_user_scores', this._get('bbp_user_scores').filter(s => s.vendorId !== id));
    const ud = Array.isArray(this._get('user_decisions')) ? this._get('user_decisions') : [];
    this._set('user_decisions', ud.filter(d => d.vendorId !== id));
    this._set('docs', this._get('docs').filter(d => d.vendorId !== id));
    // Remove from campaigns
    const cv = this._get('campaign_vendors').filter(c => c.vendorId !== id);
    this._set('campaign_vendors', cv);
    // Remove from comparison groups
    const groups = this._get('comparison_groups');
    groups.forEach(g => { g.vendorIds = (g.vendorIds || []).filter(v => v !== id); });
    this._set('comparison_groups', groups);
  },

  // AI Scores (auto-generated, read-only)
  getAIScores(vendorId) { return this._get('ai_scores').filter(s => s.vendorId === vendorId); },
  setAIScore(vendorId, criterion, score) {
    const all = this._get('ai_scores');
    const i = all.findIndex(s => s.vendorId === vendorId && s.criterion === criterion);
    if (i >= 0) { all[i].score = score; } else { all.push({ vendorId, criterion, score }); }
    this._set('ai_scores', all);
  },
  // Ensure AI scores exist for a vendor (lazy generation)
  ensureAIScores(vendor) {
    if (this.getAIScores(vendor.id).length === 0) {
      const scores = generateAIScores(vendor);
      Object.entries(scores).forEach(([c, s]) => this.setAIScore(vendor.id, c, s));
    }
  },

  // User Scores (manually entered)
  getScores(vendorId) { return this._get('scores').filter(s => s.vendorId === vendorId); },
  setScore(vendorId, criterion, score) {
    const all = this._get('scores');
    const i = all.findIndex(s => s.vendorId === vendorId && s.criterion === criterion);
    if (i >= 0) { all[i].score = score; } else { all.push({ vendorId, criterion, score }); }
    this._set('scores', all);
  },

  // Build / Buy / Partner dedicated scoring
  // path: 'BUY' | 'BUILD' | 'PARTNER', source: 'ai' | 'user'
  getBBPScores(vendorId, path, source) {
    const key = source === 'ai' ? 'bbp_ai_scores' : 'bbp_user_scores';
    return this._get(key).filter(s => s.vendorId === vendorId && s.path === path);
  },
  setBBPScore(vendorId, path, criterion, score, source) {
    const key = source === 'ai' ? 'bbp_ai_scores' : 'bbp_user_scores';
    const all = this._get(key);
    const i = all.findIndex(s => s.vendorId === vendorId && s.path === path && s.criterion === criterion);
    if (i >= 0) { all[i].score = score; } else { all.push({ vendorId, path, criterion, score }); }
    this._set(key, all);
  },
  _bbpEnsuredIds: new Set(),
  ensureBBPAIScores(vendor) {
    if (this._bbpEnsuredIds.has(vendor.id)) return;
    if (this._get('bbp_ai_scores').some(s => s.vendorId === vendor.id)) {
      this._bbpEnsuredIds.add(vendor.id);
      return;
    }
    const gen = generateBBPAIScores(vendor);
    ['BUY','BUILD','PARTNER'].forEach(p => {
      gen[p].forEach(({ criterion, score }) => this.setBBPScore(vendor.id, p, criterion, score, 'ai'));
    });
    this._bbpEnsuredIds.add(vendor.id);
  },

  // Comparison groups (sub-groups inside a campaign, e.g. "CRM candidates")
  getComparisonGroups(campaignId) { return this._get('comparison_groups').filter(g => g.campaignId === campaignId); },
  getComparisonGroup(id) { return this._get('comparison_groups').find(g => g.id === id) || null; },
  saveComparisonGroup(data) {
    const all = this._get('comparison_groups');
    if (data.id) {
      const i = all.findIndex(g => g.id === data.id);
      if (i >= 0) all[i] = { ...all[i], ...data };
    } else {
      data.id = this._nextId('comparison_groups');
      data.vendorIds = data.vendorIds || [];
      all.push(data);
    }
    this._set('comparison_groups', all);
    return data;
  },
  deleteComparisonGroup(id) {
    this._set('comparison_groups', this._get('comparison_groups').filter(g => g.id !== id));
  },
  addVendorToGroup(groupId, vendorId) {
    const all = this._get('comparison_groups');
    const g = all.find(x => x.id === groupId);
    if (g && !g.vendorIds.includes(vendorId)) { g.vendorIds.push(vendorId); this._set('comparison_groups', all); }
  },
  removeVendorFromGroup(groupId, vendorId) {
    const all = this._get('comparison_groups');
    const g = all.find(x => x.id === groupId);
    if (g) { g.vendorIds = g.vendorIds.filter(v => v !== vendorId); this._set('comparison_groups', all); }
  },

  // Distinct categories across all vendors (for autocomplete + standalone comparison picker)
  getCategories() {
    const set = new Set();
    this.getVendors().forEach(v => { if (v.category) set.add(v.category); });
    return Array.from(set).sort();
  },
  getVendorsByCategory(category) {
    return this.getVendors().filter(v => (v.category || '').trim().toLowerCase() === category.trim().toLowerCase());
  },
  getVendorsBySection(section) {
    return this.getVendors().filter(v => Array.isArray(v.sections) && v.sections.includes(section));
  },
  getUsedSections() {
    const set = new Set();
    this.getVendors().forEach(v => (v.sections || []).forEach(s => set.add(s)));
    return Array.from(set).sort();
  },

  // User manual decision (Buy/Build/Partner pick)
  getUserDecision(vendorId) {
    const all = this._get('user_decisions');
    return (Array.isArray(all) ? all : []).find(d => d.vendorId === vendorId) || null;
  },
  setUserDecision(vendorId, choice) {
    const all = Array.isArray(this._get('user_decisions')) ? this._get('user_decisions') : [];
    const i = all.findIndex(d => d.vendorId === vendorId);
    if (i >= 0) { all[i].choice = choice; all[i].updatedAt = Date.now(); }
    else all.push({ vendorId, choice, updatedAt: Date.now() });
    this._set('user_decisions', all);
  },
  clearUserDecision(vendorId) {
    const all = Array.isArray(this._get('user_decisions')) ? this._get('user_decisions') : [];
    this._set('user_decisions', all.filter(d => d.vendorId !== vendorId));
  },

  // Campaigns
  getCampaigns() { return this._get('campaigns'); },
  getCampaign(id) { return this.getCampaigns().find(c => c.id === id) || null; },
  saveCampaign(data) {
    const campaigns = this.getCampaigns();
    if (data.id) {
      const i = campaigns.findIndex(c => c.id === data.id);
      if (i >= 0) campaigns[i] = { ...campaigns[i], ...data };
    } else {
      data.id = this._nextId('campaigns');
      data.createdAt = Date.now();
      data.status = 'active';
      campaigns.push(data);
    }
    this._set('campaigns', campaigns);
    return data;
  },
  deleteCampaign(id) {
    this._set('campaigns', this.getCampaigns().filter(c => c.id !== id));
    this._set('campaign_vendors', this._get('campaign_vendors').filter(c => c.campaignId !== id));
    this._set('comparison_groups', this._get('comparison_groups').filter(g => g.campaignId !== id));
  },

  // Campaign-Vendor links
  getCampaignVendors(campaignId) {
    return this._get('campaign_vendors').filter(c => c.campaignId === campaignId).map(c => c.vendorId);
  },
  getVendorCampaigns(vendorId) {
    const ids = this._get('campaign_vendors').filter(c => c.vendorId === vendorId).map(c => c.campaignId);
    return this.getCampaigns().filter(c => ids.includes(c.id));
  },
  addVendorToCampaign(campaignId, vendorId) {
    const all = this._get('campaign_vendors');
    if (!all.find(c => c.campaignId === campaignId && c.vendorId === vendorId)) {
      all.push({ campaignId, vendorId });
      this._set('campaign_vendors', all);
    }
  },
  removeVendorFromCampaign(campaignId, vendorId) {
    this._set('campaign_vendors', this._get('campaign_vendors').filter(c => !(c.campaignId === campaignId && c.vendorId === vendorId)));
  },

  // Documents (stored as base64 - small files only)
  getDocs(vendorId) { return this._get('docs').filter(d => d.vendorId === vendorId); },
  addDoc(vendorId, name, type, dataUrl) {
    const all = this._get('docs');
    all.push({ id: this._nextId('docs'), vendorId, name, type, dataUrl, uploadedAt: Date.now() });
    this._set('docs', all);
  },
  deleteDoc(id) { this._set('docs', this._get('docs').filter(d => d.id !== id)); },

  // Users
  getUsers() { return this._get('users'); },
  getUser(id) { return this.getUsers().find(u => u.id === id) || null; },
  getUserByUsername(username) {
    return this.getUsers().find(u => u.username.toLowerCase() === username.toLowerCase()) || null;
  },
  saveUser(data) {
    const users = this.getUsers();
    if (data.id) {
      const i = users.findIndex(u => u.id === data.id);
      if (i >= 0) users[i] = { ...users[i], ...data, updatedAt: Date.now() };
    } else {
      data.id = this._nextId('users');
      data.createdAt = Date.now();
      data.updatedAt = Date.now();
      users.push(data);
    }
    this._set('users', users);
    return data;
  },
  deleteUser(id) {
    this._set('users', this.getUsers().filter(u => u.id !== id));
    const session = this.getSession();
    if (session && session.userId === id) this.clearSession();
  },

  // Session
  getSession() { try { return JSON.parse(localStorage.getItem('vm_session')) || null; } catch { return null; } },
  setSession(userId) { localStorage.setItem('vm_session', JSON.stringify({ userId, loginAt: Date.now() })); },
  clearSession() { localStorage.removeItem('vm_session'); },
  getCurrentUser() {
    const session = this.getSession();
    if (!session) return null;
    return this.getUser(session.userId);
  },

  // Seed default admin if no users exist
  seedUsers() {
    if (this.getUsers().length === 0) {
      this.saveUser({ username: 'admin', displayName: 'Administrator', role: 'admin', password: 'admin123' });
    }
  }
};

// ── User Roles & Permissions ──────────────────────────────────────────
const ROLES = {
  admin:     { label: 'Admin',     description: 'Full access — manage users, vendors, scoring, and decisions', level: 3 },
  evaluator: { label: 'Evaluator', description: 'Score vendors and make Buy/Build/Partner decisions',          level: 2 },
  viewer:    { label: 'Viewer',    description: 'View-only access to all pages',                               level: 1 }
};

const Auth = {
  currentUser()       { return Store.getCurrentUser(); },
  isLoggedIn()        { return !!this.currentUser(); },
  hasRole(minRole)    { const u = this.currentUser(); if (!u) return false; return (ROLES[u.role]?.level || 0) >= (ROLES[minRole]?.level || 99); },
  canManageUsers()    { return this.hasRole('admin'); },
  canManageVendors()  { return this.hasRole('admin'); },
  canManageCampaigns(){ return this.hasRole('admin'); },
  canScore()          { return this.hasRole('evaluator'); },
  canDecide()         { return this.hasRole('evaluator'); },
  login(username, password) {
    const user = Store.getUserByUsername(username);
    if (!user) return { ok: false, error: 'User not found' };
    if (user.password !== password) return { ok: false, error: 'Invalid password' };
    Store.setSession(user.id);
    return { ok: true };
  },
  logout() { Store.clearSession(); location.hash = '#/'; render(); }
};

Store.seedUsers();

// ── AI Auto-Score (generates intelligent defaults for new vendors) ────
function generateAIScores(vendor) {
  const has = f => vendor[f] && String(vendor[f]).trim().length > 0;
  const len = f => (vendor[f] || '').trim().length;
  const secs = (vendor.sections || []).length;
  const hasSocial = [vendor.socialLinkedin, vendor.socialTwitter, vendor.socialFacebook].filter(Boolean).length;
  const hasContact = [vendor.contactName, vendor.contactEmail, vendor.contactPhone].filter(Boolean).length;
  const profileDepth = [has('name'), has('website'), has('missionStatement'), has('project'),
    has('contactName'), has('contactEmail'), hasSocial > 0, secs > 0].filter(Boolean).length;

  // Seeded pseudo-random per vendor name for consistent but varied scores
  let seed = 0;
  for (let i = 0; i < (vendor.name || '').length; i++) seed = ((seed << 5) - seed + vendor.name.charCodeAt(i)) | 0;
  const rand = () => { seed = (seed * 16807 + 0) % 2147483647; return (seed & 0x7fffffff) / 2147483647; };

  const base = Math.min(Math.max(Math.round(profileDepth / 8 * 3) + 1, 2), 4);
  const scores = {};
  const CRITERIA_LIST = [
    'Cost Effectiveness','Technical Fit','Integration Complexity','Vendor Stability',
    'Support Quality','Security & Compliance','Scalability','Innovation',
    'Implementation Timeline','Cultural Fit'
  ];
  CRITERIA_LIST.forEach(c => {
    let s = base;
    if (c === 'Vendor Stability') { if (has('website') && hasSocial >= 2) s++; if (!has('website')) s--; }
    if (c === 'Technical Fit') { if (has('project') && len('project') > 20) s++; if (secs >= 3) s++; }
    if (c === 'Support Quality') { if (hasContact >= 2) s++; if (!has('contactEmail')) s--; }
    if (c === 'Security & Compliance') { if (has('website') && has('missionStatement')) s++; }
    if (c === 'Cultural Fit') { if (has('missionStatement') && len('missionStatement') > 30) s++; if (secs >= 2) s++; }
    if (c === 'Cost Effectiveness') { s += (rand() > 0.5 ? 1 : 0); }
    if (c === 'Scalability') { if (secs >= 4) s++; }
    if (c === 'Innovation') { if (hasSocial >= 2 && has('project')) s++; }
    if (c === 'Integration Complexity') { s = Math.max(5 - base, 2) + (rand() > 0.6 ? 1 : 0); }
    if (c === 'Implementation Timeline') { s = Math.max(5 - base, 2) + (secs > 5 ? -1 : 0); }
    s += (rand() > 0.7 ? 1 : rand() < 0.2 ? -1 : 0);
    scores[c] = Math.min(Math.max(s, 1), 5);
  });
  return scores;
}

// Generates AI defaults for the dedicated Buy/Build/Partner scoring sets.
// Heuristics are deliberately soft — the real value comes from user editing.
function generateBBPAIScores(vendor) {
  const has = f => vendor[f] && String(vendor[f]).trim().length > 0;
  const len = f => (vendor[f] || '').trim().length;
  const secs = (vendor.sections || []).length;
  const hasSocial = [vendor.socialLinkedin, vendor.socialTwitter, vendor.socialFacebook].filter(Boolean).length;
  const hasContact = [vendor.contactName, vendor.contactEmail, vendor.contactPhone].filter(Boolean).length;

  // Seeded pseudo-random per vendor name for consistency
  let seed = 0;
  for (let i = 0; i < (vendor.name || '').length; i++) seed = ((seed << 5) - seed + vendor.name.charCodeAt(i)) | 0;
  seed = Math.abs(seed) + 1;
  const rand = () => { seed = (seed * 16807) % 2147483647; return (seed & 0x7fffffff) / 2147483647; };
  const pick = (lo, hi) => lo + Math.floor(rand() * (hi - lo + 1));

  const out = { BUY: [], BUILD: [], PARTNER: [] };

  // BUY — external vendors with mature presence score higher
  const buyBase = has('website') ? 4 : 3;
  BUY_CRITERIA.forEach(c => {
    let s = buyBase;
    if (c === 'Vendor Maturity' && has('website') && hasSocial >= 2) s++;
    if (c === 'Total Cost of Ownership') s = pick(2, 4); // noisy — needs user input
    if (c === 'Integration Ease' && secs >= 3) s++;
    if (c === 'Vendor Lock-in Risk') s = pick(2, 4);
    if (c === 'SLA Strength' && hasContact >= 2) s++;
    if (c === 'Time to Value' && has('project') && len('project') > 20) s++;
    s += pick(-1, 1);
    out.BUY.push({ criterion: c, score: Math.min(Math.max(s, 1), 5) });
  });

  // BUILD — default lower unless vendor description hints at deep customization
  const buildBase = 3;
  BUILD_CRITERIA.forEach(c => {
    let s = buildBase;
    if (c === 'In-house Capability') s = pick(2, 3);
    if (c === 'Team Capacity') s = pick(2, 3);
    if (c === 'Strategic Differentiation' && has('missionStatement') && len('missionStatement') > 40) s++;
    if (c === 'Maintenance Burden') s = pick(3, 4); // higher = worse (inverted)
    if (c === 'Cost to Build') s = pick(3, 4);     // higher = worse (inverted)
    if (c === 'Control / IP Value' && secs >= 4) s++;
    s += pick(-1, 1);
    out.BUILD.push({ criterion: c, score: Math.min(Math.max(s, 1), 5) });
  });

  // PARTNER — mission + cultural signals matter
  const partnerBase = has('missionStatement') ? 4 : 3;
  PARTNER_CRITERIA.forEach(c => {
    let s = partnerBase;
    if (c === 'Cultural Alignment' && has('missionStatement') && len('missionStatement') > 30) s++;
    if (c === 'Co-dev Potential' && has('project')) s++;
    if (c === 'Risk-sharing Terms') s = pick(2, 4);
    if (c === 'Strategic Leverage' && hasSocial >= 2) s++;
    if (c === 'Exit Flexibility') s = pick(2, 4);
    if (c === 'Mutual Incentive') s = pick(3, 4);
    s += pick(-1, 1);
    out.PARTNER.push({ criterion: c, score: Math.min(Math.max(s, 1), 5) });
  });

  return out;
}

// Sum a BBP path's score (0-30), inverting criteria where higher input = worse path fit
function sumBBPPath(vendorId, path, source) {
  const rows = Store.getBBPScores(vendorId, path, source);
  if (rows.length === 0) return null;
  let total = 0;
  rows.forEach(r => {
    const inverted = BBP_INVERTED[path].has(r.criterion);
    total += inverted ? (6 - r.score) : r.score;
  });
  return total;
}

// ── AI Scoring ─────────────────────────────────────────────────────────
function calcAIScore(vendor) {
  const aiScores = Store.getAIScores(vendor.id);
  let total = 0;
  const fields = ['name','website','contactName','contactEmail','missionStatement','project'];
  const filled = fields.filter(f => vendor[f] && String(vendor[f]).trim()).length;
  total += (filled / fields.length) * 20;
  if (aiScores.length > 0) {
    const avg = aiScores.reduce((s, sc) => s + sc.score, 0) / aiScores.length;
    total += (avg / 5) * 50;
  }
  const secs = (vendor.sections || []).length;
  total += Math.min(secs / 5, 1) * 15;
  let web = 0;
  if (vendor.website) web += 5;
  if (vendor.socialLinkedin) web += 4;
  if (vendor.socialTwitter) web += 3;
  if (vendor.socialFacebook) web += 3;
  total += Math.min(web, 15);
  return Math.round(total);
}

function calcUserScore(vendor) {
  const userScores = Store.getScores(vendor.id);
  if (userScores.length === 0) return null;
  let total = 0;
  const fields = ['name','website','contactName','contactEmail','missionStatement','project'];
  const filled = fields.filter(f => vendor[f] && String(vendor[f]).trim()).length;
  total += (filled / fields.length) * 20;
  const avg = userScores.reduce((s, sc) => s + sc.score, 0) / userScores.length;
  total += (avg / 5) * 50;
  const secs = (vendor.sections || []).length;
  total += Math.min(secs / 5, 1) * 15;
  let web = 0;
  if (vendor.website) web += 5;
  if (vendor.socialLinkedin) web += 4;
  if (vendor.socialTwitter) web += 3;
  if (vendor.socialFacebook) web += 3;
  total += Math.min(web, 15);
  return Math.round(total);
}

// Returns { recommendation, confidence, scores:{buy,build,partner(pct 0-100)}, source }
// Prefers user BBP scores when present; otherwise falls back to AI BBP scores.
// `scoreSource` — 'user' forces user-only (returns null if no user BBP), 'ai' forces AI,
// omitted = auto (user if any, else AI).
function calcDecision(vendorId, scoreSource) {
  const vendor = Store.getVendor(vendorId);
  if (vendor) Store.ensureBBPAIScores(vendor);

  const userCounts = ['BUY','BUILD','PARTNER'].map(p => Store.getBBPScores(vendorId, p, 'user').length);
  const hasAnyUser = userCounts.some(c => c > 0);

  const useSource = scoreSource === 'user' ? 'user'
    : scoreSource === 'ai' ? 'ai'
    : (hasAnyUser ? 'user' : 'ai');

  if (useSource === 'user' && !hasAnyUser) return null;

  // Pull each path, using AI as fill-in for any path the user hasn't touched under auto mode
  const paths = {};
  ['BUY','BUILD','PARTNER'].forEach(p => {
    let s = sumBBPPath(vendorId, p, useSource);
    if (s == null && scoreSource == null) s = sumBBPPath(vendorId, p, 'ai');
    paths[p] = s == null ? 0 : s;
  });

  const entries = [['BUY', paths.BUY], ['BUILD', paths.BUILD], ['PARTNER', paths.PARTNER]];
  entries.sort((a, b) => b[1] - a[1]);
  const [winner, winnerScore] = entries[0];
  const runnerUp = entries[1][1];
  // Confidence = how dominant is the winner (normalized against max possible + margin)
  const dominance = winnerScore === 0 ? 0 : (winnerScore - runnerUp) / BBP_MAX;
  const baseConf = winnerScore / BBP_MAX;
  const confidence = Math.round(Math.min(100, (baseConf * 70) + (dominance * 60)));

  return {
    recommendation: winner,
    confidence,
    source: useSource,
    scores: {
      buy: Math.round((paths.BUY / BBP_MAX) * 100),
      build: Math.round((paths.BUILD / BBP_MAX) * 100),
      partner: Math.round((paths.PARTNER / BBP_MAX) * 100)
    },
    raw: paths
  };
}

// ── Secure DOM Helpers ─────────────────────────────────────────────────
function el(tag, attrs, ...children) {
  const e = document.createElement(tag);
  if (attrs) {
    for (const [k, v] of Object.entries(attrs)) {
      if (v === undefined || v === null) continue;
      if (k === 'className') e.className = v;
      else if (k === 'onclick' || k === 'onchange' || k === 'oninput') e.addEventListener(k.slice(2), v);
      else if (k === 'htmlFor') e.htmlFor = v;
      else if (k === 'value') e.value = v;
      else if (k === 'type') e.type = v;
      else if (k === 'placeholder') e.placeholder = v;
      else if (k === 'rows') e.rows = v;
      else if (k === 'disabled') e.disabled = v;
      else if (k === 'selected') e.selected = v;
      else if (k === 'multiple') e.multiple = v;
      else if (k === 'title') e.title = v;
      else if (k === 'href') e.href = v;
      else if (k === 'target') e.target = v;
      else if (k === 'rel') e.rel = v;
      else e.setAttribute(k, v);
    }
  }
  for (const c of children) {
    if (c == null) continue;
    if (typeof c === 'string' || typeof c === 'number') e.appendChild(document.createTextNode(String(c)));
    else if (c instanceof Node) e.appendChild(c);
    else if (Array.isArray(c)) c.forEach(x => { if (x instanceof Node) e.appendChild(x); });
  }
  return e;
}

function svg(d) {
  const s = document.createElementNS('http://www.w3.org/2000/svg','svg');
  s.setAttribute('class','w-5 h-5 flex-shrink-0');

  s.setAttribute('stroke','currentColor');
  s.setAttribute('viewBox','0 0 24 24');
  s.setAttribute('stroke-width','1.5');
  const p = document.createElementNS('http://www.w3.org/2000/svg','path');
  p.setAttribute('stroke-linecap','round');
  p.setAttribute('stroke-linejoin','round');
  p.setAttribute('d', d);
  s.appendChild(p);
  return s;
}

        r.dec ? decisionBadge(r.dec.recommendation) : el('span', { className: 'text-gray-300 text-xs' }, '--')
      ),
      el('td', { className: 'py-3 px-2 text-center text-xs' },
        v.estAnnualCost
          ? el('span', { className: isBestCost ? hi('text-emerald-700 font-bold') : 'text-slate-700' },
              costNum != null ? '$' + costNum.toLocaleString() : v.estAnnualCost)
          : el('span', { className: 'text-slate-300' }, '--')
      ),
      el('td', { className: 'py-3 px-2 text-center text-xs' },
        v.timeToDeploy
          ? el('span', { className: isBestTime ? hi('text-emerald-700 font-bold') : 'text-slate-700' }, v.timeToDeploy + 'w')
          : el('span', { className: 'text-slate-300' }, '--')
      ),
      el('td', { className: 'py-3 px-2 text-center text-xs text-slate-600' }, v.uptimeSla ? v.uptimeSla + '%' : el('span', { className: 'text-slate-300' }, '--')),
      el('td', { className: 'py-3 px-2 text-center text-xs text-slate-600' }, v.supportTier || el('span', { className: 'text-slate-300' }, '--')),
      onRemove ? el('td', { className: 'py-3 px-2 text-right' },
        el('button', { className: 'text-gray-400 hover:text-red-600 text-xs', title: 'Remove', onclick: () => onRemove(v.id) }, 'X')
      ) : null
    ));
  });
  table.appendChild(tbody);
  return el('div', { className: 'overflow-x-auto' }, table);
}

// ── Input sanitization ─────────────────────────────────────────────────
function sanitize(str) {
  if (typeof str !== 'string') return '';
  return str.replace(/[<>"'&]/g, c => ({'<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#x27;','&':'&amp;'}[c]));
}
function cleanStr(str) {
  if (typeof str !== 'string') return '';
  return str.trim().slice(0, 5000); // limit length
}

// ── Router ─────────────────────────────────────────────────────────────
function getRoute() {
  const h = location.hash || '#/';
  const [pathPart] = h.slice(2).split('?');
  const parts = pathPart.split('/');
  return { path: parts[0] || '', id: parts[1] ? parseInt(parts[1], 10) : null, action: parts[2] || '' };
}

function renderNav() {
  const nav = document.getElementById('nav');
  nav.innerHTML = '';
  const current = location.hash || '#/';
  const user = Auth.currentUser();
  NAV.forEach(n => {
    if (n.adminOnly && (!user || user.role !== 'admin')) return;
    const a = el('a', { href: n.hash, className: `nav-link ${current === n.hash || (n.hash !== '#/' && current.startsWith(n.hash)) ? 'active' : ''}`, onclick: closeSidebar }, svg(n.icon), n.label);
    nav.appendChild(a);
  });
  // Update sidebar footer with user info
  const footer = document.getElementById('sidebar-footer');
  if (footer && user) {
    footer.innerHTML = '';
    footer.appendChild(el('div', { className: 'flex items-center gap-2 mb-2' },
      el('div', { className: 'w-7 h-7 rounded-full bg-indigo-600/30 flex items-center justify-center flex-shrink-0' },
        el('span', { className: 'text-xs font-bold text-indigo-300' }, user.displayName.charAt(0).toUpperCase())
      ),
      el('div', { className: 'min-w-0 flex-1' },
        el('p', { className: 'text-xs text-white font-medium truncate' }, user.displayName),
        el('p', { className: 'text-[10px] text-indigo-300/60' }, ROLES[user.role]?.label || user.role)
      )
    ));
    footer.appendChild(el('button', {
      className: 'w-full text-left text-[11px] text-indigo-300/50 hover:text-indigo-200 mt-1 transition-colors cursor-pointer',
      onclick: () => Auth.logout()
    }, 'Sign out'));
  }
}

function render() {
  const content = document.getElementById('content');
  content.innerHTML = '';

  // Auth gate — show login if no session
  if (!Auth.isLoggedIn()) {
    document.getElementById('sidebar').style.display = 'none';
    document.getElementById('mobile-header').style.setProperty('display', 'none', 'important');
    renderLogin(content);
    return;
  }
  document.getElementById('sidebar').style.display = '';

  renderNav();
  const route = getRoute();
  const denied = () => content.appendChild(card(el('p', { className: 'text-red-600 text-center py-12' }, 'Access denied — you don\u2019t have permission to view this page.')));
  try {
    if (route.path === '' || route.path === undefined) renderDashboard(content);
    else if (route.path === 'vendors' && route.action === 'new') { if (!Auth.canManageVendors()) { denied(); return; } renderVendorForm(content); }
    else if (route.path === 'vendors' && route.action === 'edit') { if (!Auth.canManageVendors()) { denied(); return; } renderVendorForm(content, route.id); }
    else if (route.path === 'vendors') renderVendors(content);
    else if (route.path === 'campaigns' && route.action === 'new') { if (!Auth.canManageCampaigns()) { denied(); return; } renderCampaignForm(content); }
    else if (route.path === 'campaigns' && route.id) renderCampaignDetail(content, route.id);
    else if (route.path === 'campaigns') renderCampaigns(content);
    else if (route.path === 'compare') renderCompare(content);
    else if (route.path === 'scoring') renderScoring(content);
    else if (route.path === 'decisions') renderDecisions(content);
    else if (route.path === 'users') { if (!Auth.canManageUsers()) { denied(); return; } renderUsers(content); }
    else renderDashboard(content);
  } catch (err) {
    content.appendChild(el('div', { className: 'text-red-600' }, 'Error rendering page: ' + err.message));
  }
}

window.addEventListener('hashchange', render);
window.addEventListener('DOMContentLoaded', render);

// ── Dashboard ──────────────────────────────────────────────────────────
function renderDashboard(root) {
  const vendors = Store.getVendors();
  vendors.forEach(v => Store.ensureAIScores(v));
  const campaigns = Store.getCampaigns().filter(c => c.status === 'active');
  const vendorData = vendors.map(v => {
    const aiScoresArr = Store.getAIScores(v.id);
    const userScoresArr = Store.getScores(v.id);
    const aiSum = aiScoresArr.reduce((t, s) => t + s.score, 0);
    const userSum = userScoresArr.length > 0 ? userScoresArr.reduce((t, s) => t + s.score, 0) : null;
    return { ...v, aiSum, userSum, effectiveScore: userSum !== null ? userSum : aiSum, decision: calcDecision(v.id, 'ai') };
  });
  const scored = vendorData.filter(v => v.decision);
  const userScored = vendorData.filter(v => v.userSum !== null);
  const avgScore = userScored.length
    ? Math.round(userScored.reduce((s, v) => s + v.userSum, 0) / userScored.length)
    : (scored.length ? Math.round(scored.reduce((s, v) => s + v.aiSum, 0) / scored.length) : 0);
  const top5 = [...vendorData].sort((a, b) => b.effectiveScore - a.effectiveScore).slice(0, 5);
  const counts = { BUY: 0, BUILD: 0, PARTNER: 0 };
  scored.forEach(v => counts[v.decision.recommendation]++);

  root.appendChild(el('div', { className: 'mb-8' },
    el('h1', { className: 'text-2xl font-bold text-gray-900' }, 'Dashboard'),
    el('p', { className: 'text-gray-500 text-sm mt-1' }, 'Vendor evaluation overview for AF Group')
  ));

  // Stats
  const stats = el('div', { className: 'grid grid-cols-2 md:grid-cols-4 gap-3 md:gap-5 mb-8' });
  [
    { label: 'TOTAL VENDORS', val: vendors.length, color: 'text-indigo-700', href: '#/vendors' },
    { label: 'ACTIVE CAMPAIGNS', val: campaigns.length, color: 'text-purple-700', href: '#/campaigns' },
    { label: 'VENDORS SCORED', val: scored.length, color: 'text-emerald-700', href: '#/scoring' },
    { label: userScored.length ? 'AVG YOUR SCORE' : 'AVG AI SCORE', val: avgScore, color: 'text-amber-700', href: '#/decisions' }
  ].forEach(s => {
    const c = el('a', { href: s.href, className: 'bg-white/80 backdrop-blur-sm rounded-2xl shadow-sm border border-white/60 p-6 block hover:shadow-lg hover:-translate-y-0.5 transition-all duration-200 no-underline group' },
      el('p', { className: 'text-[11px] font-semibold text-slate-400 uppercase tracking-wider' }, s.label),
      el('p', { className: `text-3xl font-bold mt-2 ${s.color} group-hover:scale-105 transition-transform duration-200 origin-left` }, String(s.val))
    );
    stats.appendChild(c);
  });
  root.appendChild(stats);

  const grid = el('div', { className: 'grid grid-cols-1 lg:grid-cols-2 gap-6' });

  // Top vendors
  const topCard = card(
    el('div', { className: 'flex items-center justify-between mb-4' },
      el('h2', { className: 'font-semibold text-gray-900' }, 'Top Rated Vendors'),
      el('a', { href: '#/vendors', className: 'text-sm text-indigo-600 hover:underline' }, 'View all')
    )
  );
  if (top5.length === 0) {
    topCard.appendChild(el('p', { className: 'text-sm text-gray-400 py-4' }, 'No vendors yet. ',
      el('a', { href: '#/vendors/0/new', className: 'text-indigo-600 hover:underline' }, 'Add one')));
  } else {
    top5.forEach((v, i) => {
      const hasUser = v.userSum !== null;
      const badge = hasUser
        ? userScoreBadge(v.userSum)
        : aiBadge(v.aiSum);
      topCard.appendChild(el('div', { className: 'flex items-center justify-between p-3 rounded-lg hover:bg-gray-50 transition-colors' },
        el('div', { className: 'flex items-center gap-3' },
          el('span', { className: 'w-7 h-7 rounded-full bg-gray-100 text-gray-500 flex items-center justify-center text-xs font-bold' }, String(i + 1)),
          el('div', {},
            el('p', { className: 'font-medium text-sm text-gray-900' }, v.name),
            v.project ? el('p', { className: 'text-xs text-gray-400' }, v.project) : null
          )
        ),
        badge
      ));
    });
  }
  grid.appendChild(topCard);

  // Decision summary
  const decCard = card(el('h2', { className: 'font-semibold text-gray-900 mb-4' }, 'Decision Summary'));
  if (scored.length === 0) {
    decCard.appendChild(el('p', { className: 'text-sm text-gray-400 py-4' }, 'Score vendors to see recommendations.'));
  } else {
    [{ l:'Buy',c:counts.BUY,bg:'bg-emerald-500' }, { l:'Build',c:counts.BUILD,bg:'bg-blue-500' }, { l:'Partner',c:counts.PARTNER,bg:'bg-purple-500' }].forEach(r => {
      const pct = scored.length > 0 ? (r.c / scored.length) * 100 : 0;
      decCard.appendChild(el('div', { className: 'mb-4' },
        el('div', { className: 'flex justify-between text-sm mb-1.5' },
          el('span', { className: 'font-medium text-gray-700' }, r.l),
          el('span', { className: 'text-slate-400 text-xs' }, `${r.c} vendor${r.c !== 1 ? 's' : ''}`)
        ),
        el('div', { className: 'w-full bg-gray-100 rounded-full h-2.5 overflow-hidden' },
          Object.assign(el('div', { className: `${r.bg} h-2.5 rounded-full bar-fill` }), { style: { width: pct + '%' } })
        )
      ));
    });
  }
  grid.appendChild(decCard);
  root.appendChild(grid);
}

// ── Vendors List ───────────────────────────────────────────────────────
function renderVendors(root) {
  const allVendors = Store.getVendors();
  allVendors.forEach(v => { Store.ensureAIScores(v); Store.ensureBBPAIScores(v); });

  let search = '';
  let filterCategory = '';
  let filterRec = '';
  let page = 0;
  const PAGE_SIZE = 30;

  const header = el('div', { className: 'flex items-center justify-between mb-6 gap-3' },
    el('div', {},
      el('h1', { className: 'text-2xl font-bold text-gray-900' }, 'Vendors'),
      el('p', { className: 'text-gray-500 text-sm mt-1' }, `${allVendors.length} vendors registered`)
    ),
    Auth.canManageVendors()
      ? el('a', { href: '#/vendors/0/new', className: 'bg-gradient-to-r from-indigo-500 to-indigo-600 text-white px-5 py-2.5 rounded-xl hover:from-indigo-600 hover:to-indigo-700 font-semibold text-sm shadow-sm shadow-indigo-200 hover:shadow-md hover:shadow-indigo-200 transition-all duration-200 no-underline' }, '+ Add Vendor')
      : null
  );
  root.appendChild(header);

  // Filter bar
  const filterBar = el('div', { className: 'flex flex-wrap gap-2 mb-5' });
  const searchInput = el('input', {
    type: 'text', placeholder: 'Search by name, project, category, contact...',
    className: 'flex-1 min-w-[240px] border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:ring-2 focus:ring-indigo-500/30 focus:border-indigo-400 outline-none bg-white/60 backdrop-blur-sm placeholder:text-slate-400 transition-all duration-200',
    oninput: e => { search = e.target.value.toLowerCase(); page = 0; renderList(); }
  });
  filterBar.appendChild(searchInput);

  const catSel = el('select', {
    className: 'border border-slate-200 rounded-xl px-3 py-2.5 text-sm bg-white/60 outline-none',
    onchange: e => { filterCategory = e.target.value; page = 0; renderList(); }
  });
  catSel.appendChild(el('option', { value: '' }, 'All categories'));
  Array.from(new Set([...VENDOR_CATEGORIES, ...Store.getCategories()])).sort().forEach(c => catSel.appendChild(el('option', { value: c }, c)));
  filterBar.appendChild(catSel);

  const recSel = el('select', {
    className: 'border border-slate-200 rounded-xl px-3 py-2.5 text-sm bg-white/60 outline-none',
    onchange: e => { filterRec = e.target.value; page = 0; renderList(); }
  });
  recSel.appendChild(el('option', { value: '' }, 'All recommendations'));
  ['BUY','BUILD','PARTNER'].forEach(r => recSel.appendChild(el('option', { value: r }, r)));
  filterBar.appendChild(recSel);
  root.appendChild(filterBar);

  const listEl = el('div', { className: 'grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5' });
  const pagerEl = el('div', { className: 'flex items-center justify-between mt-5' });
  root.appendChild(listEl);
  root.appendChild(pagerEl);

  const allCampaigns = Store.getCampaigns();

  function getFiltered() {
    return allVendors.filter(v => {
      if (search) {
        const hay = `${v.name} ${v.project || ''} ${v.category || ''} ${v.contactName || ''}`.toLowerCase();
        if (!hay.includes(search)) return false;
      }
      if (filterCategory && (v.category || '') !== filterCategory) return false;
      if (filterRec) {
        const dec = calcDecision(v.id);
        if (!dec || dec.recommendation !== filterRec) return false;
      }
      return true;
    });
  }

  function renderList() {
    listEl.innerHTML = '';
    pagerEl.innerHTML = '';
    const filtered = getFiltered();
    if (filtered.length === 0) {
      listEl.appendChild(card(el('p', { className: 'text-gray-400 text-center py-6' }, 'No vendors found.')));
      return;
    }

    const totalPages = Math.max(1, Math.ceil(filtered.length / PAGE_SIZE));
    if (page >= totalPages) page = totalPages - 1;
    const pageVendors = filtered.slice(page * PAGE_SIZE, (page + 1) * PAGE_SIZE);

    pageVendors.forEach(v => {
      const secs = v.sections || [];
      const vCamps = Store.getVendorCampaigns(v.id);
      const dec = calcDecision(v.id);
      const c = card(
        el('div', { className: 'flex items-start justify-between mb-2 gap-2' },
          el('div', { className: 'min-w-0' },
            el('p', { className: 'font-semibold text-gray-900 truncate' }, v.name),
            v.category ? el('p', { className: 'text-[11px] text-indigo-500 font-medium mt-0.5' }, v.category) : null
          ),
          Auth.canManageVendors() ? el('div', { className: 'flex gap-1 flex-shrink-0' },
            el('a', { href: `#/vendors/${v.id}/edit`, className: 'text-gray-400 hover:text-indigo-600 p-1 text-xs' }, 'Edit'),
            el('button', { className: 'text-gray-400 hover:text-red-600 p-1 text-xs', onclick: () => {
              if (confirm(`Delete "${v.name}"?`)) { Store.deleteVendor(v.id); renderList(); }
            }}, 'Del')
          ) : null
        ),
        v.project ? el('p', { className: 'text-xs text-gray-500 mb-2 line-clamp-2' }, v.project) : null,
        v.contactName ? el('p', { className: 'text-xs text-gray-400 mb-2' }, 'Contact: ' + v.contactName) : null,
        dec ? el('div', { className: 'flex items-center gap-2 mt-2' },
          decisionBadge(dec.recommendation),
          el('span', { className: 'text-[10px] text-slate-400' }, dec.confidence + '%')
        ) : null
      );
      if (secs.length > 0) {
        const tags = el('div', { className: 'flex flex-wrap gap-1 mt-2' });
        secs.slice(0, 3).forEach(s => tags.appendChild(el('span', { className: 'text-xs bg-indigo-50 text-indigo-600 px-2 py-0.5 rounded-full' }, s)));
        if (secs.length > 3) tags.appendChild(el('span', { className: 'text-xs bg-gray-100 text-gray-500 px-2 py-0.5 rounded-full' }, `+${secs.length - 3}`));
        c.appendChild(tags);
      }
      if (allCampaigns.length > 0) {
        const campRow = el('div', { className: 'mt-3 pt-3 border-t border-slate-100' });
        if (vCamps.length > 0) {
          const campTags = el('div', { className: 'flex flex-wrap gap-1.5 mb-2' });
          vCamps.forEach(camp => {
            campTags.appendChild(el('span', { className: 'text-xs bg-purple-50 text-purple-600 px-2 py-0.5 rounded-full inline-flex items-center gap-1' },
              camp.name,
              Auth.canManageCampaigns() ? el('button', { className: 'text-purple-400 hover:text-red-500 font-bold ml-0.5', title: 'Remove from campaign', onclick: () => { Store.removeVendorFromCampaign(camp.id, v.id); renderList(); } }, '\u00d7') : null
            ));
          });
          campRow.appendChild(campTags);
        }
        if (Auth.canManageCampaigns()) {
          const availableCamps = allCampaigns.filter(camp => !vCamps.find(vc => vc.id === camp.id));
          if (availableCamps.length > 0) {
            const addWrap = el('div', { className: 'flex items-center gap-1' });
            const sel = el('select', { className: 'text-xs border border-slate-200 rounded-lg px-2 py-1 bg-white/60 outline-none' });
            sel.appendChild(el('option', { value: '' }, 'Add to campaign...'));
            availableCamps.forEach(camp => sel.appendChild(el('option', { value: String(camp.id) }, camp.name)));
            addWrap.appendChild(sel);
            addWrap.appendChild(el('button', {
              className: 'text-xs text-indigo-600 font-semibold hover:text-indigo-700',
              onclick: () => { const cid = parseInt(sel.value, 10); if (cid) { Store.addVendorToCampaign(cid, v.id); renderList(); } }
            }, 'Add'));
            campRow.appendChild(addWrap);
          }
        }
        c.appendChild(campRow);
      }
      listEl.appendChild(c);
    });

    // Pager
    if (totalPages > 1) {
      pagerEl.appendChild(el('p', { className: 'text-xs text-slate-500' },
        `Page ${page + 1} of ${totalPages} — showing ${pageVendors.length} of ${filtered.length}`
      ));
      const nav = el('div', { className: 'flex gap-2' });
      nav.appendChild(el('button', {
        className: `px-3 py-1.5 rounded-lg text-xs font-semibold border ${page === 0 ? 'border-slate-200 text-slate-300 cursor-not-allowed' : 'border-slate-200 text-slate-700 hover:bg-slate-50'}`,
        disabled: page === 0,
        onclick: () => { if (page > 0) { page--; renderList(); } }
      }, '\u2190 Prev'));
      nav.appendChild(el('button', {
        className: `px-3 py-1.5 rounded-lg text-xs font-semibold border ${page >= totalPages - 1 ? 'border-slate-200 text-slate-300 cursor-not-allowed' : 'border-slate-200 text-slate-700 hover:bg-slate-50'}`,
        disabled: page >= totalPages - 1,
        onclick: () => { if (page < totalPages - 1) { page++; renderList(); } }
      }, 'Next \u2192'));
      pagerEl.appendChild(nav);
    } else if (filtered.length > 0) {
      pagerEl.appendChild(el('p', { className: 'text-xs text-slate-500' }, `${filtered.length} vendor${filtered.length !== 1 ? 's' : ''}`));
    }
  }
  renderList();
}

// ── Vendor Form ────────────────────────────────────────────────────────
function renderVendorForm(root, editId) {
  const existing = editId ? Store.getVendor(editId) : null;
  const form = {
    name: existing?.name || '', website: existing?.website || '',
    category: existing?.category || '',
    socialLinkedin: existing?.socialLinkedin || '', socialTwitter: existing?.socialTwitter || '', socialFacebook: existing?.socialFacebook || '',
    contactName: existing?.contactName || '', contactEmail: existing?.contactEmail || '', contactPhone: existing?.contactPhone || '',
    missionStatement: existing?.missionStatement || '', project: existing?.project || '',
    sections: [...(existing?.sections || [])], notes: existing?.notes || '',
    // Efficiency metrics
    pricingModel: existing?.pricingModel || '',
    estAnnualCost: existing?.estAnnualCost || '',
    timeToDeploy: existing?.timeToDeploy || '',
    usersSupported: existing?.usersSupported || '',
    uptimeSla: existing?.uptimeSla || '',
    supportTier: existing?.supportTier || ''
  };

  root.appendChild(el('div', { className: 'mb-6' },
    el('h1', { className: 'text-2xl font-bold text-gray-900' }, existing ? 'Edit Vendor' : 'Add New Vendor'),
    el('p', { className: 'text-gray-500 text-sm mt-1' }, 'Fill in the vendor details below')
  ));

  const formEl = el('div', { className: 'max-w-3xl space-y-6' });

  function field(label, key, type, placeholder, opts) {
    const isTextarea = type === 'textarea';
    const input = el(isTextarea ? 'textarea' : 'input', {
      className: 'w-full border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:ring-2 focus:ring-indigo-500/30 focus:border-indigo-400 outline-none bg-white/60 placeholder:text-slate-400 transition-all duration-200',
      type: isTextarea ? undefined : type, placeholder: placeholder || '',
      value: isTextarea ? undefined : form[key], rows: isTextarea ? (opts?.rows || 3) : undefined,
      oninput: e => { form[key] = e.target.value; }
    });
    if (opts?.list) input.setAttribute('list', opts.list);
    if (isTextarea) input.textContent = form[key];
    return el('div', { className: opts?.full ? 'md:col-span-2' : '' },
      el('label', { className: 'block text-sm font-medium text-gray-700 mb-1' }, label + (opts?.required ? ' *' : '')),
      input
    );
  }

  function selectField(label, key, options, opts) {
    const sel = el('select', {
      className: 'w-full border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:ring-2 focus:ring-indigo-500/30 focus:border-indigo-400 outline-none bg-white/60 transition-all duration-200',
      onchange: e => { form[key] = e.target.value; }
    });
    sel.appendChild(el('option', { value: '' }, '— select —'));
    options.forEach(o => {
      const opt = el('option', { value: o }, o);
      if (form[key] === o) opt.selected = true;
      sel.appendChild(opt);
    });
    return el('div', { className: opts?.full ? 'md:col-span-2' : '' },
      el('label', { className: 'block text-sm font-medium text-gray-700 mb-1' }, label),
      sel
    );
  }

  // Categories datalist (for autocomplete on the category input)
  const knownCategories = Array.from(new Set([...VENDOR_CATEGORIES, ...Store.getCategories()])).sort();
  const catDatalist = el('datalist', { id: 'vendor-categories-list' });
  knownCategories.forEach(c => catDatalist.appendChild(el('option', { value: c })));
  formEl.appendChild(catDatalist);

  // Basic Info
  formEl.appendChild(card(
    el('h2', { className: 'font-semibold text-gray-900 mb-4' }, 'Basic Information'),

        if (existing) {

        if (!name) { errEl.textContent = 'Vendor name is required'; errEl.className = 'text-red-600 text-sm mb-2'; return; }
        const data = {
          ...(existing || {}),
          name,
          category: cleanStr(form.category),
          website: cleanStr(form.website),
          socialLinkedin: cleanStr(form.socialLinkedin), socialTwitter: cleanStr(form.socialTwitter), socialFacebook: cleanStr(form.socialFacebook),
          contactName: cleanStr(form.contactName), contactEmail: cleanStr(form.contactEmail), contactPhone: cleanStr(form.contactPhone),
          missionStatement: cleanStr(form.missionStatement), project: cleanStr(form.project),
          sections: form.sections, notes: cleanStr(form.notes),
          pricingModel: cleanStr(form.pricingModel),
          estAnnualCost: cleanStr(form.estAnnualCost),
          timeToDeploy: cleanStr(form.timeToDeploy),
          usersSupported: cleanStr(form.usersSupported),
          uptimeSla: cleanStr(form.uptimeSla),
          supportTier: cleanStr(form.supportTier)
        };
        const saved = Store.saveVendor(data);
        if (!existing) {
          // Seed both legacy generic AI scores and the new BBP AI scores
          const aiScores = generateAIScores(saved);
          CRITERIA.forEach(c => Store.setAIScore(saved.id, c, aiScores[c]));
          Store.ensureBBPAIScores(saved);
          // Flush any docs staged during creation
          stagedDocs.forEach(d => Store.addDoc(saved.id, d.name, d.type, d.dataUrl));
        }
        location.hash = '#/vendors';
      }
    }, existing ? 'Update Vendor' : 'Create Vendor'),
    el('button', {
      className: 'bg-white/80 text-slate-600 px-5 py-2.5 rounded-xl border border-slate-200 hover:bg-slate-50 hover:border-slate-300 font-medium text-sm transition-all duration-200',
      onclick: () => history.back()
    }, 'Cancel')
  ));

  root.appendChild(formEl);
}
