<script>
"use strict";

// ── Mobile sidebar toggle ─────────────────────────────────────────────
function openSidebar() {
  document.getElementById('sidebar').classList.add('open');
  document.getElementById('sidebar-overlay').classList.add('open');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebar-overlay').classList.remove('open');
}
document.addEventListener('DOMContentLoaded', () => {
  const btn = document.getElementById('menu-btn');
  if (btn) btn.addEventListener('click', openSidebar);
});

// ── Data Layer (localStorage) ──────────────────────────────────────────
const Store = {
  _get(key) { try { return JSON.parse(localStorage.getItem('vm_' + key)) || []; } catch { return []; } },
  _set(key, val) { localStorage.setItem('vm_' + key, JSON.stringify(val)); },
  _nextId(key) {
    const counter = 'vm_id_' + key;
    const id = (parseInt(localStorage.getItem(counter) || '0', 10)) + 1;
    localStorage.setItem(counter, String(id));
    return id;
  },

  // Vendors
  getVendors() { return this._get('vendors'); },
  getVendor(id) { return this.getVendors().find(v => v.id === id) || null; },
  saveVendor(data) {
    const vendors = this.getVendors();
    if (data.id) {
      const i = vendors.findIndex(v => v.id === data.id);
      if (i >= 0) vendors[i] = { ...vendors[i], ...data, updatedAt: Date.now() };
    } else {
      data.id = this._nextId('vendors');
      data.createdAt = Date.now();
      data.updatedAt = Date.now();
      vendors.push(data);
    }
    this._set('vendors', vendors);
    return data;
  },
  deleteVendor(id) {
    this._set('vendors', this.getVendors().filter(v => v.id !== id));
    this._set('scores', this._get('scores').filter(s => s.vendorId !== id));
    this._set('ai_scores', this._get('ai_scores').filter(s => s.vendorId !== id));
    const ud = Array.isArray(this._get('user_decisions')) ? this._get('user_decisions') : [];
    this._set('user_decisions', ud.filter(d => d.vendorId !== id));
    this._set('docs', this._get('docs').filter(d => d.vendorId !== id));
    // Remove from campaigns
    const cv = this._get('campaign_vendors').filter(c => c.vendorId !== id);
    this._set('campaign_vendors', cv);
  },

  // AI Scores (auto-generated, read-only)
  getAIScores(vendorId) { return this._get('ai_scores').filter(s => s.vendorId === vendorId); },
  setAIScore(vendorId, criterion, score) {
    const all = this._get('ai_scores');
    const i = all.findIndex(s => s.vendorId === vendorId && s.criterion === criterion);
    if (i >= 0) { all[i].score = score; } else { all.push({ vendorId, criterion, score }); }
    this._set('ai_scores', all);
  },
  // Ensure AI scores exist for a vendor (lazy generation)
  ensureAIScores(vendor) {
    if (this.getAIScores(vendor.id).length === 0) {
      const scores = generateAIScores(vendor);
      Object.entries(scores).forEach(([c, s]) => this.setAIScore(vendor.id, c, s));
    }
  },

  // User Scores (manually entered)
  getScores(vendorId) { return this._get('scores').filter(s => s.vendorId === vendorId); },
  setScore(vendorId, criterion, score) {
    const all = this._get('scores');
    const i = all.findIndex(s => s.vendorId === vendorId && s.criterion === criterion);
    if (i >= 0) { all[i].score = score; } else { all.push({ vendorId, criterion, score }); }
    this._set('scores', all);
  },

  // User manual decision (Buy/Build/Partner pick)
  getUserDecision(vendorId) {
    const all = this._get('user_decisions');
    return (Array.isArray(all) ? all : []).find(d => d.vendorId === vendorId) || null;
  },
  setUserDecision(vendorId, choice) {
    const all = Array.isArray(this._get('user_decisions')) ? this._get('user_decisions') : [];
    const i = all.findIndex(d => d.vendorId === vendorId);
    if (i >= 0) { all[i].choice = choice; all[i].updatedAt = Date.now(); }
    else all.push({ vendorId, choice, updatedAt: Date.now() });
    this._set('user_decisions', all);
  },
  clearUserDecision(vendorId) {
    const all = Array.isArray(this._get('user_decisions')) ? this._get('user_decisions') : [];
    this._set('user_decisions', all.filter(d => d.vendorId !== vendorId));
  },

  // Campaigns
  getCampaigns() { return this._get('campaigns'); },
  getCampaign(id) { return this.getCampaigns().find(c => c.id === id) || null; },
  saveCampaign(data) {
    const campaigns = this.getCampaigns();
    if (data.id) {
      const i = campaigns.findIndex(c => c.id === data.id);
      if (i >= 0) campaigns[i] = { ...campaigns[i], ...data };
    } else {
      data.id = this._nextId('campaigns');
      data.createdAt = Date.now();
      data.status = 'active';
      campaigns.push(data);
    }
    this._set('campaigns', campaigns);
    return data;
  },
  deleteCampaign(id) {
    this._set('campaigns', this.getCampaigns().filter(c => c.id !== id));
    this._set('campaign_vendors', this._get('campaign_vendors').filter(c => c.campaignId !== id));
  },

  // Campaign-Vendor links
  getCampaignVendors(campaignId) {
    return this._get('campaign_vendors').filter(c => c.campaignId === campaignId).map(c => c.vendorId);
  },
  getVendorCampaigns(vendorId) {
    const ids = this._get('campaign_vendors').filter(c => c.vendorId === vendorId).map(c => c.campaignId);
    return this.getCampaigns().filter(c => ids.includes(c.id));
  },
  addVendorToCampaign(campaignId, vendorId) {
    const all = this._get('campaign_vendors');
    if (!all.find(c => c.campaignId === campaignId && c.vendorId === vendorId)) {
      all.push({ campaignId, vendorId });
      this._set('campaign_vendors', all);
    }
  },
  removeVendorFromCampaign(campaignId, vendorId) {
    this._set('campaign_vendors', this._get('campaign_vendors').filter(c => !(c.campaignId === campaignId && c.vendorId === vendorId)));
  },

  // Documents (stored as base64 - small files only)
  getDocs(vendorId) { return this._get('docs').filter(d => d.vendorId === vendorId); },
  addDoc(vendorId, name, type, dataUrl) {
    const all = this._get('docs');
    all.push({ id: this._nextId('docs'), vendorId, name, type, dataUrl, uploadedAt: Date.now() });
    this._set('docs', all);
  },
  deleteDoc(id) { this._set('docs', this._get('docs').filter(d => d.id !== id)); }
};

// ── AI Auto-Score (generates intelligent defaults for new vendors) ────
function generateAIScores(vendor) {
  const has = f => vendor[f] && String(vendor[f]).trim().length > 0;
  const len = f => (vendor[f] || '').trim().length;
  const secs = (vendor.sections || []).length;
  const hasSocial = [vendor.socialLinkedin, vendor.socialTwitter, vendor.socialFacebook].filter(Boolean).length;
  const hasContact = [vendor.contactName, vendor.contactEmail, vendor.contactPhone].filter(Boolean).length;
  const profileDepth = [has('name'), has('website'), has('missionStatement'), has('project'),
    has('contactName'), has('contactEmail'), hasSocial > 0, secs > 0].filter(Boolean).length;

  // Seeded pseudo-random per vendor name for consistent but varied scores
  let seed = 0;
  for (let i = 0; i < (vendor.name || '').length; i++) seed = ((seed << 5) - seed + vendor.name.charCodeAt(i)) | 0;
  const rand = () => { seed = (seed * 16807 + 0) % 2147483647; return (seed & 0x7fffffff) / 2147483647; };

  const base = Math.min(Math.max(Math.round(profileDepth / 8 * 3) + 1, 2), 4);
  const scores = {};
  const CRITERIA_LIST = [
    'Cost Effectiveness','Technical Fit','Integration Complexity','Vendor Stability',
    'Support Quality','Security & Compliance','Scalability','Innovation',
    'Implementation Timeline','Cultural Fit'
  ];
  CRITERIA_LIST.forEach(c => {
    let s = base;
    if (c === 'Vendor Stability') { if (has('website') && hasSocial >= 2) s++; if (!has('website')) s--; }
    if (c === 'Technical Fit') { if (has('project') && len('project') > 20) s++; if (secs >= 3) s++; }
    if (c === 'Support Quality') { if (hasContact >= 2) s++; if (!has('contactEmail')) s--; }
    if (c === 'Security & Compliance') { if (has('website') && has('missionStatement')) s++; }
    if (c === 'Cultural Fit') { if (has('missionStatement') && len('missionStatement') > 30) s++; if (secs >= 2) s++; }
    if (c === 'Cost Effectiveness') { s += (rand() > 0.5 ? 1 : 0); }
    if (c === 'Scalability') { if (secs >= 4) s++; }
    if (c === 'Innovation') { if (hasSocial >= 2 && has('project')) s++; }
    if (c === 'Integration Complexity') { s = Math.max(5 - base, 2) + (rand() > 0.6 ? 1 : 0); }
    if (c === 'Implementation Timeline') { s = Math.max(5 - base, 2) + (secs > 5 ? -1 : 0); }
    s += (rand() > 0.7 ? 1 : rand() < 0.2 ? -1 : 0);
    scores[c] = Math.min(Math.max(s, 1), 5);
  });
  return scores;
}

// ── Constants ──────────────────────────────────────────────────────────
const CRITERIA = [
  'Cost Effectiveness','Technical Fit','Integration Complexity','Vendor Stability',
  'Support Quality','Security & Compliance','Scalability','Innovation',
  'Implementation Timeline','Cultural Fit'
];
const SECTIONS = [
  'Claims','Underwriting','IT / Technology','Marketing','Human Resources',
  'Finance / Accounting','Legal / Compliance','Customer Service','Risk Management',
  'Sales','Operations','Actuarial','Loss Control','Executive Leadership'
];
const NAV = [
  { hash: '#/', label: 'Dashboard', icon: 'M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-4 0h4' },
  { hash: '#/vendors', label: 'Vendors', icon: 'M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4' },
  { hash: '#/campaigns', label: 'Campaigns', icon: 'M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01' },
  { hash: '#/scoring', label: 'Scoring', icon: 'M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z' },
  { hash: '#/decisions', label: 'Decisions', icon: 'M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z' }
];

// ── AI Scoring ─────────────────────────────────────────────────────────
function calcAIScore(vendor) {
  const aiScores = Store.getAIScores(vendor.id);
  let total = 0;
  const fields = ['name','website','contactName','contactEmail','missionStatement','project'];
  const filled = fields.filter(f => vendor[f] && String(vendor[f]).trim()).length;
  total += (filled / fields.length) * 20;
  if (aiScores.length > 0) {
    const avg = aiScores.reduce((s, sc) => s + sc.score, 0) / aiScores.length;
    total += (avg / 5) * 50;
  }
  const secs = (vendor.sections || []).length;
  total += Math.min(secs / 5, 1) * 15;
  let web = 0;
  if (vendor.website) web += 5;
  if (vendor.socialLinkedin) web += 4;
  if (vendor.socialTwitter) web += 3;
  if (vendor.socialFacebook) web += 3;
  total += Math.min(web, 15);
  return Math.round(total);
}

function calcUserScore(vendor) {
  const userScores = Store.getScores(vendor.id);
  if (userScores.length === 0) return null;
  let total = 0;
  const fields = ['name','website','contactName','contactEmail','missionStatement','project'];
  const filled = fields.filter(f => vendor[f] && String(vendor[f]).trim()).length;
  total += (filled / fields.length) * 20;
  const avg = userScores.reduce((s, sc) => s + sc.score, 0) / userScores.length;
  total += (avg / 5) * 50;
  const secs = (vendor.sections || []).length;
  total += Math.min(secs / 5, 1) * 15;
  let web = 0;
  if (vendor.website) web += 5;
  if (vendor.socialLinkedin) web += 4;
  if (vendor.socialTwitter) web += 3;
  if (vendor.socialFacebook) web += 3;
  total += Math.min(web, 15);
  return Math.round(total);
}

function calcDecision(vendorId, scoreSource) {
  const scores = scoreSource === 'ai' ? Store.getAIScores(vendorId) : Store.getScores(vendorId);
  if (scores.length === 0) return null;
  const m = {};
  scores.forEach(s => { m[s.criterion] = s.score; });
  const inv = v => 6 - (v || 3);
  const buy = (m['Technical Fit']||0)*3 + (m['Cost Effectiveness']||0)*2 + (m['Vendor Stability']||0)*3 + (m['Support Quality']||0)*2 + inv(m['Integration Complexity'])*2;
  const build = (m['Scalability']||0)*3 + (m['Security & Compliance']||0)*3 + (m['Innovation']||0)*2 + inv(m['Implementation Timeline'])*2 + inv(m['Vendor Stability'])*2;
  const partner = (m['Cultural Fit']||0)*3 + (m['Innovation']||0)*3 + (m['Technical Fit']||0)*2 + (m['Scalability']||0)*2 + (m['Support Quality']||0)*2;
  const best = Math.max(buy, build, partner);
  let rec = 'BUY';
  if (best === build && build > buy) rec = 'BUILD';
  if (best === partner && partner > buy && partner > build) rec = 'PARTNER';
  return {
    recommendation: rec,
    confidence: Math.round((best / 60) * 100),
    scores: { buy: Math.round((buy/60)*100), build: Math.round((build/60)*100), partner: Math.round((partner/60)*100) }
  };
}

// ── Secure DOM Helpers ─────────────────────────────────────────────────
function el(tag, attrs, ...children) {
  const e = document.createElement(tag);
  if (attrs) {
    for (const [k, v] of Object.entries(attrs)) {
      if (v === undefined || v === null) continue;
      if (k === 'className') e.className = v;
      else if (k === 'onclick' || k === 'onchange' || k === 'oninput') e.addEventListener(k.slice(2), v);
      else if (k === 'htmlFor') e.htmlFor = v;
      else if (k === 'value') e.value = v;
      else if (k === 'type') e.type = v;
      else if (k === 'placeholder') e.placeholder = v;
      else if (k === 'rows') e.rows = v;
      else if (k === 'disabled') e.disabled = v;
      else if (k === 'selected') e.selected = v;
      else if (k === 'multiple') e.multiple = v;
      else if (k === 'title') e.title = v;
      else if (k === 'href') e.href = v;
      else if (k === 'target') e.target = v;
      else if (k === 'rel') e.rel = v;
      else e.setAttribute(k, v);
    }
  }
  for (const c of children) {
    if (c == null) continue;
    if (typeof c === 'string' || typeof c === 'number') e.appendChild(document.createTextNode(String(c)));
    else if (c instanceof Node) e.appendChild(c);
    else if (Array.isArray(c)) c.forEach(x => { if (x instanceof Node) e.appendChild(x); });
  }
  return e;
}

function svg(d) {
  const s = document.createElementNS('http://www.w3.org/2000/svg','svg');
  s.setAttribute('class','w-5 h-5 flex-shrink-0');
  s.setAttribute('fill','none');
  s.setAttribute('stroke','currentColor');
  s.setAttribute('viewBox','0 0 24 24');
  s.setAttribute('stroke-width','1.5');
  const p = document.createElementNS('http://www.w3.org/2000/svg','path');
  p.setAttribute('stroke-linecap','round');
  p.setAttribute('stroke-linejoin','round');
  p.setAttribute('d', d);
  s.appendChild(p);
  return s;
}

function scoreButtons(current, onSelect) {

  return el('span', { className: `px-3 py-1 rounded-full text-xs font-bold ${colors[rec] || ''}` }, rec);
}

function card(...children) { return el('div', { className: 'bg-white/80 backdrop-blur-sm rounded-2xl shadow-sm border border-white/60 p-4 md:p-6 transition-all duration-200 hover:shadow-md' }, ...children); }

// ── Input sanitization ─────────────────────────────────────────────────
function sanitize(str) {
  if (typeof str !== 'string') return '';
  return str.replace(/[<>"'&]/g, c => ({'<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#x27;','&':'&amp;'}[c]));
}
function cleanStr(str) {
  if (typeof str !== 'string') return '';
  return str.trim().slice(0, 5000); // limit length
}

// ── Router ─────────────────────────────────────────────────────────────
function getRoute() {
  const h = location.hash || '#/';
  const parts = h.slice(2).split('/');
  return { path: parts[0] || '', id: parts[1] ? parseInt(parts[1], 10) : null, action: parts[2] || '' };
}

function renderNav() {
  const nav = document.getElementById('nav');
  nav.innerHTML = '';
  const current = location.hash || '#/';
  NAV.forEach(n => {
    const a = el('a', { href: n.hash, className: `nav-link ${current === n.hash || (n.hash !== '#/' && current.startsWith(n.hash)) ? 'active' : ''}`, onclick: closeSidebar }, svg(n.icon), n.label);
    nav.appendChild(a);
  });
}

function render() {
  renderNav();
  const content = document.getElementById('content');
  content.innerHTML = '';
  const route = getRoute();
  try {
    if (route.path === '' || route.path === undefined) renderDashboard(content);
    else if (route.path === 'vendors' && route.action === 'new') renderVendorForm(content);
    else if (route.path === 'vendors' && route.action === 'edit') renderVendorForm(content, route.id);
    else if (route.path === 'vendors') renderVendors(content);
    else if (route.path === 'campaigns' && route.action === 'new') renderCampaignForm(content);
    else if (route.path === 'campaigns' && route.id) renderCampaignDetail(content, route.id);
    else if (route.path === 'campaigns') renderCampaigns(content);
    else if (route.path === 'scoring') renderScoring(content);
    else if (route.path === 'decisions') renderDecisions(content);
    else renderDashboard(content);
  } catch (err) {
    content.appendChild(el('div', { className: 'text-red-600' }, 'Error rendering page: ' + err.message));
  }
}

window.addEventListener('hashchange', render);
window.addEventListener('DOMContentLoaded', render);

// ── Dashboard ──────────────────────────────────────────────────────────
function renderDashboard(root) {
  const vendors = Store.getVendors();
  vendors.forEach(v => Store.ensureAIScores(v));
  const campaigns = Store.getCampaigns().filter(c => c.status === 'active');
  const vendorData = vendors.map(v => {
    const aiScoresArr = Store.getAIScores(v.id);
    const userScoresArr = Store.getScores(v.id);
    const aiSum = aiScoresArr.reduce((t, s) => t + s.score, 0);
    const userSum = userScoresArr.length > 0 ? userScoresArr.reduce((t, s) => t + s.score, 0) : null;
    return { ...v, aiSum, userSum, effectiveScore: userSum !== null ? userSum : aiSum, decision: calcDecision(v.id, 'ai') };
  });
  const scored = vendorData.filter(v => v.decision);
  const userScored = vendorData.filter(v => v.userSum !== null);
  const avgScore = userScored.length
    ? Math.round(userScored.reduce((s, v) => s + v.userSum, 0) / userScored.length)
    : (scored.length ? Math.round(scored.reduce((s, v) => s + v.aiSum, 0) / scored.length) : 0);
  const top5 = [...vendorData].sort((a, b) => b.effectiveScore - a.effectiveScore).slice(0, 5);
  const counts = { BUY: 0, BUILD: 0, PARTNER: 0 };
  scored.forEach(v => counts[v.decision.recommendation]++);

  root.appendChild(el('div', { className: 'mb-8' },
    el('h1', { className: 'text-2xl font-bold text-gray-900' }, 'Dashboard'),
    el('p', { className: 'text-gray-500 text-sm mt-1' }, 'Vendor evaluation overview for AF Group')
  ));

  // Stats
  const stats = el('div', { className: 'grid grid-cols-2 md:grid-cols-4 gap-3 md:gap-5 mb-8' });
  [
    { label: 'TOTAL VENDORS', val: vendors.length, color: 'text-indigo-700', href: '#/vendors' },
    { label: 'ACTIVE CAMPAIGNS', val: campaigns.length, color: 'text-purple-700', href: '#/campaigns' },
    { label: 'VENDORS SCORED', val: scored.length, color: 'text-emerald-700', href: '#/scoring' },
    { label: userScored.length ? 'AVG YOUR SCORE' : 'AVG AI SCORE', val: avgScore, color: 'text-amber-700', href: '#/decisions' }
  ].forEach(s => {
    const c = el('a', { href: s.href, className: 'bg-white/80 backdrop-blur-sm rounded-2xl shadow-sm border border-white/60 p-6 block hover:shadow-lg hover:-translate-y-0.5 transition-all duration-200 no-underline group' },
      el('p', { className: 'text-[11px] font-semibold text-slate-400 uppercase tracking-wider' }, s.label),
      el('p', { className: `text-3xl font-bold mt-2 ${s.color} group-hover:scale-105 transition-transform duration-200 origin-left` }, String(s.val))
    );
    stats.appendChild(c);
  });
  root.appendChild(stats);

  const grid = el('div', { className: 'grid grid-cols-1 lg:grid-cols-2 gap-6' });

  // Top vendors
  const topCard = card(
    el('div', { className: 'flex items-center justify-between mb-4' },
      el('h2', { className: 'font-semibold text-gray-900' }, 'Top Rated Vendors'),
      el('a', { href: '#/vendors', className: 'text-sm text-indigo-600 hover:underline' }, 'View all')
    )
  );
  if (top5.length === 0) {
    topCard.appendChild(el('p', { className: 'text-sm text-gray-400 py-4' }, 'No vendors yet. ',
      el('a', { href: '#/vendors/0/new', className: 'text-indigo-600 hover:underline' }, 'Add one')));
  } else {
    top5.forEach((v, i) => {
      const hasUser = v.userSum !== null;
      const badge = hasUser
        ? userScoreBadge(v.userSum)
        : aiBadge(v.aiSum);
      topCard.appendChild(el('div', { className: 'flex items-center justify-between p-3 rounded-lg hover:bg-gray-50 transition-colors' },
        el('div', { className: 'flex items-center gap-3' },
          el('span', { className: 'w-7 h-7 rounded-full bg-gray-100 text-gray-500 flex items-center justify-center text-xs font-bold' }, String(i + 1)),
          el('div', {},
            el('p', { className: 'font-medium text-sm text-gray-900' }, v.name),
            v.project ? el('p', { className: 'text-xs text-gray-400' }, v.project) : null
          )
        ),
        badge
      ));
    });
  }
  grid.appendChild(topCard);

  // Decision summary
  const decCard = card(el('h2', { className: 'font-semibold text-gray-900 mb-4' }, 'Decision Summary'));
  if (scored.length === 0) {
    decCard.appendChild(el('p', { className: 'text-sm text-gray-400 py-4' }, 'Score vendors to see recommendations.'));
  } else {
    [{ l:'Buy',c:counts.BUY,bg:'bg-emerald-500' }, { l:'Build',c:counts.BUILD,bg:'bg-blue-500' }, { l:'Partner',c:counts.PARTNER,bg:'bg-purple-500' }].forEach(r => {
      const pct = scored.length > 0 ? (r.c / scored.length) * 100 : 0;
      decCard.appendChild(el('div', { className: 'mb-4' },
        el('div', { className: 'flex justify-between text-sm mb-1.5' },
          el('span', { className: 'font-medium text-gray-700' }, r.l),
          el('span', { className: 'text-slate-400 text-xs' }, `${r.c} vendor${r.c !== 1 ? 's' : ''}`)
        ),
        el('div', { className: 'w-full bg-gray-100 rounded-full h-2.5 overflow-hidden' },
          Object.assign(el('div', { className: `${r.bg} h-2.5 rounded-full bar-fill` }), { style: { width: pct + '%' } })
        )
      ));
    });
  }
  grid.appendChild(decCard);
  root.appendChild(grid);
}

// ── Vendors List ───────────────────────────────────────────────────────
function renderVendors(root) {

    el('div', {},
      el('h1', { className: 'text-2xl font-bold text-gray-900' }, 'Vendors'),

    ),

  root.appendChild(listEl);

  function renderList() {
    listEl.innerHTML = '';

      (v.project || '').toLowerCase().includes(search.toLowerCase()) ||
      (v.contactName || '').toLowerCase().includes(search.toLowerCase())

    if (vendors.length === 0) {
      listEl.appendChild(card(el('p', { className: 'text-gray-400 text-center py-6' }, 'No vendors found.')));
      return;
    }
    const allCampaigns = Store.getCampaigns();
    vendors.forEach(v => {

      const c = card(
        el('div', { className: 'flex items-start justify-between mb-3' },
          el('p', { className: 'font-semibold text-gray-900' }, v.name),
          el('div', { className: 'flex gap-1' },
            el('a', { href: `#/vendors/${v.id}/edit`, className: 'text-gray-400 hover:text-indigo-600 p-1 text-xs' }, 'Edit'),
            el('button', { className: 'text-gray-400 hover:text-red-600 p-1 text-xs', onclick: () => {
              if (confirm(`Delete "${v.name}"?`)) { Store.deleteVendor(v.id); renderList(); }
            }}, 'Del')
          )
        ),
        v.project ? el('p', { className: 'text-xs text-gray-500 mb-2' }, v.project) : null,
        v.contactName ? el('p', { className: 'text-xs text-gray-400 mb-2' }, 'Contact: ' + v.contactName) : null

        if (secs.length > 3) tags.appendChild(el('span', { className: 'text-xs bg-gray-100 text-gray-500 px-2 py-0.5 rounded-full' }, `+${secs.length - 3}`));
        c.appendChild(tags);
      }
      // Campaign membership — editable tags with remove
      if (allCampaigns.length > 0) {
        const campRow = el('div', { className: 'mt-3 pt-3 border-t border-slate-100' });
        if (vCamps.length > 0) {
          const campTags = el('div', { className: 'flex flex-wrap gap-1.5 mb-2' });
          vCamps.forEach(camp => {
            campTags.appendChild(el('span', { className: 'text-xs bg-purple-50 text-purple-600 px-2 py-0.5 rounded-full inline-flex items-center gap-1' },
              camp.name,
              el('button', { className: 'text-purple-400 hover:text-red-500 font-bold ml-0.5', title: 'Remove from campaign', onclick: () => { Store.removeVendorFromCampaign(camp.id, v.id); renderList(); } }, '\u00d7')
            ));

function renderCampaignDetail(root, id) {
  const campaign = Store.getCampaign(id);
  if (!campaign) { root.appendChild(el('p', { className: 'text-gray-400' }, 'Campaign not found')); return; }

  root.appendChild(el('div', { className: 'flex items-start justify-between mb-6' },
    el('div', {},
      el('a', { href: '#/campaigns', className: 'text-sm text-indigo-600 hover:underline mb-2 inline-block' }, '\u2190 All Campaigns'),
      el('h1', { className: 'text-2xl font-bold text-gray-900' }, campaign.name),
      campaign.description ? el('p', { className: 'text-gray-500 text-sm mt-1' }, campaign.description) : null,
      campaign.objective ? el('p', { className: 'text-gray-400 text-xs mt-1' }, 'Objective: ' + campaign.objective) : null
    ),
    el('span', { className: `text-xs px-3 py-1 rounded-full ${campaign.status === 'active' ? 'bg-emerald-50 text-emerald-700' : 'bg-gray-100 text-gray-500'}` }, campaign.status)
  ));

  // Add vendor
  const vendorIds = Store.getCampaignVendors(id);
  const allVendors = Store.getVendors();
  const available = allVendors.filter(v => !vendorIds.includes(v.id));

  const addCard = card(el('h2', { className: 'font-semibold text-gray-900 mb-3' }, 'Add Vendor to Campaign'));
  const select = el('select', { className: 'w-full border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:ring-2 focus:ring-indigo-500/30 focus:border-indigo-400 outline-none bg-white/60 placeholder:text-slate-400 transition-all duration-200 flex-1' });
  select.appendChild(el('option', { value: '' }, 'Select a vendor...'));
  available.forEach(v => select.appendChild(el('option', { value: String(v.id) }, v.name)));
  addCard.appendChild(el('div', { className: 'flex gap-2' },
    select,
    el('button', { className: 'bg-gradient-to-r from-indigo-500 to-indigo-600 text-white px-5 py-2.5 rounded-xl hover:from-indigo-600 hover:to-indigo-700 font-semibold text-sm shadow-sm shadow-indigo-200 hover:shadow-md hover:shadow-indigo-200 transition-all duration-200', onclick: () => {
      const vid = parseInt(select.value, 10);
      if (vid) { Store.addVendorToCampaign(id, vid); render(); }
    }}, 'Add')
  ));
  if (available.length === 0 && allVendors.length > 0) addCard.appendChild(el('p', { className: 'text-xs text-gray-400 mt-2' }, 'All vendors are in this campaign.'));
  if (allVendors.length === 0) addCard.appendChild(el('p', { className: 'text-xs text-gray-400 mt-2' }, 'No vendors available. Add one first.'));
  root.appendChild(addCard);

  // Comparison table
  const vendors = vendorIds.map(vid => Store.getVendor(vid)).filter(Boolean);
  if (vendors.length > 0) {
    const tableCard = card(el('h2', { className: 'font-semibold text-gray-900 mb-4' }, 'Vendor Comparison'));
    const table = el('table', { className: 'w-full text-sm' });
    const thead = el('thead', {},
      el('tr', { className: 'border-b border-gray-200' },
        el('th', { className: 'text-left py-3 px-2 font-medium text-gray-500' }, 'Vendor'),
        el('th', { className: 'text-center py-3 px-2 font-medium text-indigo-500' }, 'AI Score'),
        el('th', { className: 'text-center py-3 px-2 font-medium text-emerald-600' }, 'Your Score'),
        el('th', { className: 'text-center py-3 px-2 font-medium text-indigo-500' }, 'AI Rec'),
        el('th', { className: 'text-center py-3 px-2 font-medium text-emerald-600' }, 'Your Pick'),
        el('th', { className: 'text-center py-3 px-2 font-medium text-gray-500' }, 'Match'),
        el('th', { className: 'py-3 px-2' }, '')
      )
    );
    table.appendChild(thead);
    const tbody = el('tbody', {});
    vendors.forEach(v => {
      Store.ensureAIScores(v);
      const aiScoresArr = Store.getAIScores(v.id);
      const userScoresArr = Store.getScores(v.id);
      const aiSum = aiScoresArr.reduce((t, s) => t + s.score, 0);
      const userSum = userScoresArr.reduce((t, s) => t + s.score, 0);
      const dec = calcDecision(v.id, 'ai');
      const userPick = Store.getUserDecision(v.id);
      const aiRec = dec ? dec.recommendation : null;
      const uPick = userPick ? userPick.choice : null;
      const match = aiRec && uPick ? (aiRec === uPick) : null;
      tbody.appendChild(el('tr', { className: 'border-b border-gray-50 hover:bg-gray-50' },
        el('td', { className: 'py-3 px-2 font-medium text-gray-900' }, v.name),
        el('td', { className: 'py-3 px-2 text-center font-bold text-indigo-600' }, String(aiSum) + '/50'),
        el('td', { className: 'py-3 px-2 text-center font-bold' }, userScoresArr.length > 0
          ? el('span', { className: 'text-emerald-600' }, String(userSum) + '/50')
          : el('span', { className: 'text-slate-300' }, '--')),
        el('td', { className: 'py-3 px-2 text-center' }, aiRec ? decisionBadge(aiRec) : el('span', { className: 'text-gray-300 text-xs' }, '--')),
        el('td', { className: 'py-3 px-2 text-center' }, uPick ? decisionBadge(uPick) : el('span', { className: 'text-slate-300 text-xs' }, '--')),
        el('td', { className: 'py-3 px-2 text-center' }, match === null
          ? el('span', { className: 'text-slate-300 text-xs' }, '--')
          : match
            ? el('span', { className: 'text-xs font-bold text-emerald-500 bg-emerald-50 px-2 py-0.5 rounded-full' }, 'Aligned')
            : el('span', { className: 'text-xs font-bold text-amber-500 bg-amber-50 px-2 py-0.5 rounded-full' }, 'Differs')),
        el('td', { className: 'py-3 px-2 text-right' },
          el('button', { className: 'text-gray-400 hover:text-red-600 text-xs', title: 'Remove', onclick: () => { Store.removeVendorFromCampaign(id, v.id); render(); } }, 'X')
        )
      ));
    });
    table.appendChild(tbody);
    tableCard.appendChild(el('div', { className: 'overflow-x-auto' }, table));
    root.appendChild(tableCard);
  } else {
    root.appendChild(card(el('p', { className: 'text-gray-400 text-center py-12' }, 'No vendors in this campaign yet.')));
  }
}

  if (vendors.length === 0) {
    root.appendChild(card(el('p', { className: 'text-gray-400 text-center py-12' }, 'No vendors to score. '),
      el('a', { href: '#/vendors/0/new', className: 'text-indigo-600 hover:underline' }, 'Add a Vendor')));
    return;
  }

  const grid = el('div', { className: 'flex flex-col lg:grid lg:grid-cols-4 gap-6' });
  const listCol = el('div', { className: 'flex lg:flex-col gap-2 overflow-x-auto pb-2 lg:pb-0 lg:overflow-visible' });
  listCol.appendChild(el('p', { className: 'text-xs font-medium text-gray-500 uppercase tracking-wide mb-2' }, 'Select Vendor'));
  const panel = el('div', { className: 'lg:col-span-3' });

  function renderPanel() {
    panel.innerHTML = '';
    if (!selectedId) {
      panel.appendChild(card(el('p', { className: 'text-gray-400 text-center py-16' }, 'Select a vendor from the list to start scoring')));
      return;
    }
    const vendor = Store.getVendor(selectedId);
    if (!vendor) return;
    Store.ensureAIScores(vendor);
    const aiScoresArr = Store.getAIScores(selectedId);
    const userScoresArr = Store.getScores(selectedId);
    const aiMap = {}; aiScoresArr.forEach(s => { aiMap[s.criterion] = s.score; });
    const userMap = {}; userScoresArr.forEach(s => { userMap[s.criterion] = s.score; });
    const aiTotal = calcAIScore(vendor);
    const aiDec = calcDecision(selectedId, 'ai');

    // Calculate totals first for the header badges
    let aiSum = 0, userSum = 0, userCount = 0;
    CRITERIA.forEach(c => {
      aiSum += (aiMap[c] || 0);
      const uv = userMap[c] || 0;
      if (uv) { userSum += uv; userCount++; }
    });

    // Scoring table with side-by-side columns
    const scCard = card(
      el('div', { className: 'flex flex-col sm:flex-row sm:items-center justify-between mb-5 gap-3' },
        el('div', {},
          el('h2', { className: 'font-semibold text-gray-900 text-lg' }, vendor.name),
          el('p', { className: 'text-xs text-gray-400' }, 'AI scores on the left, click 1-5 on the right to add yours')
        ),
        el('div', { className: 'flex items-center gap-3 md:gap-5' },
          el('div', { className: 'text-center' },
            el('div', { className: 'w-14 h-14 md:w-20 md:h-20 rounded-full ring-4 ring-indigo-200 bg-gradient-to-br from-indigo-400 to-indigo-600 flex items-center justify-center text-lg md:text-2xl font-bold text-white shadow-sm' }, String(aiSum)),
            el('p', { className: 'text-[10px] text-indigo-400 font-semibold mt-1.5 uppercase tracking-wider' }, 'AI / 50')
          ),
          el('div', { className: 'text-center' },
            userCount > 0
              ? el('div', { className: 'w-14 h-14 md:w-20 md:h-20 rounded-full ring-4 ring-emerald-200 bg-gradient-to-br from-emerald-400 to-emerald-600 flex items-center justify-center text-lg md:text-2xl font-bold text-white shadow-sm' }, String(userSum))
              : el('div', { className: 'w-14 h-14 md:w-20 md:h-20 rounded-full ring-4 ring-slate-200 bg-slate-100 flex items-center justify-center text-lg md:text-2xl font-bold text-slate-300' }, '--'),
            el('p', { className: 'text-[10px] text-emerald-500 font-semibold mt-1.5 uppercase tracking-wider' }, 'You / 50')
          )
        )
      )
    );
    // Column headers
    scCard.appendChild(el('div', { className: 'hidden md:flex items-center py-2 mb-1 border-b-2 border-slate-200' },
      el('div', { className: 'flex-1' }, el('span', { className: 'text-xs font-semibold text-slate-500 uppercase tracking-wider' }, 'Criterion')),
      el('div', { className: 'w-12 text-center' }, el('span', { className: 'text-xs font-semibold text-indigo-500 uppercase tracking-wider' }, 'AI')),
      el('div', { className: 'w-52 text-center' }, el('span', { className: 'text-xs font-semibold text-emerald-600 uppercase tracking-wider' }, 'Your Score'))
    ));

    CRITERIA.forEach(c => {
      const aiVal = aiMap[c] || 0;
      const userVal = userMap[c] || 0;
      scCard.appendChild(el('div', { className: 'flex flex-wrap md:flex-nowrap items-center py-3 border-b border-slate-100/80 gap-2 md:gap-0' },
        el('div', { className: 'w-full md:w-auto md:flex-1 md:mr-3 flex items-center justify-between md:block' },
          el('p', { className: 'text-sm font-medium text-gray-700' }, c),
          el('span', { className: 'ai-pill md:hidden' }, String(aiVal))
        ),
        el('div', { className: 'w-12 hidden md:flex justify-center' }, el('span', { className: 'ai-pill' }, String(aiVal))),
        el('div', { className: 'w-full md:w-52 flex justify-center md:justify-center' },
          scoreButtons(userVal, score => { Store.setScore(selectedId, c, score); renderVendorList(); renderPanel(); })
        )
      ));
    });

    // Totals row
    scCard.appendChild(el('div', { className: 'flex items-center py-3 mt-1 bg-slate-50/80 rounded-xl px-3 -mx-1' },
      el('div', { className: 'flex-1' }, el('p', { className: 'text-sm font-bold text-slate-700' }, 'Total')),
      el('div', { className: 'w-12 text-center' }, el('span', { className: 'text-sm font-bold text-indigo-600' }, String(aiSum) + '/50')),
      el('div', { className: 'w-auto md:w-52 text-center' }, el('span', { className: 'text-sm font-bold text-emerald-600' }, userCount > 0 ? String(userSum) + '/50' : '--'))
    ));
    panel.appendChild(scCard);

    // AI Decision card (read-only)
    if (aiDec) {
      const aiDecCard = card(el('h3', { className: 'font-semibold text-gray-900 mb-4' }, 'AI Decision'));
      aiDecCard.style.borderTop = '3px solid #6366f1';
      [{ l:'Buy',s:aiDec.scores.buy,bg:'bg-emerald-500' },{ l:'Build',s:aiDec.scores.build,bg:'bg-blue-500' },{ l:'Partner',s:aiDec.scores.partner,bg:'bg-purple-500' }].forEach(d => {
        aiDecCard.appendChild(el('div', { className: 'mb-3' },
          el('div', { className: 'flex justify-between text-xs mb-1' }, el('span', { className: 'font-medium text-slate-600' }, d.l), el('span', { className: 'font-bold text-slate-800' }, d.s + '%')),
          el('div', { className: 'w-full bg-gray-100 rounded-full h-2.5 overflow-hidden' },
            Object.assign(el('div', { className: `${d.bg} h-2.5 rounded-full bar-fill` }), { style: { width: d.s + '%' } }))
        ));
      });
      const recColor = { BUY:'text-emerald-600', BUILD:'text-blue-600', PARTNER:'text-purple-600' };
      aiDecCard.appendChild(el('div', { className: 'p-3 bg-gradient-to-r from-indigo-50 to-violet-50 rounded-xl border border-indigo-100 text-center mt-2' },
        el('p', { className: 'text-xs text-slate-500' }, 'AI Recommends'),
        el('p', { className: `font-bold text-lg ${recColor[aiDec.recommendation]}` }, aiDec.recommendation),
        el('p', { className: 'text-xs text-slate-400' }, aiDec.confidence + '% confidence')
      ));
      panel.appendChild(el('div', { className: 'mt-6' }, aiDecCard));
    }
  }

  function renderVendorList() {
    listCol.querySelectorAll('.vendor-item').forEach(e => e.remove());
    vendors.forEach(v => {
      const userScoresArr = Store.getScores(v.id);
      const aiScoresArr = Store.getAIScores(v.id);
      const aiSum = aiScoresArr.reduce((t, s) => t + s.score, 0);
      const userSum = userScoresArr.reduce((t, s) => t + s.score, 0);
      const btn = el('button', {
        className: `vendor-item flex-shrink-0 lg:flex-shrink lg:w-full text-left p-3 rounded-xl transition-all duration-200 ${selectedId === v.id ? 'bg-indigo-50 border-2 border-indigo-300 shadow-sm shadow-indigo-100' : 'bg-white/80 border border-gray-200/80 hover:border-indigo-200 hover:bg-indigo-50/30'}`,
        onclick: () => { selectedId = v.id; renderVendorList(); renderPanel(); }
      },
        el('p', { className: 'font-medium text-sm text-gray-900 mb-1' }, v.name),
        el('div', { className: 'flex gap-3' },
          el('span', { className: 'text-xs text-indigo-500 font-semibold' }, `AI: ${aiSum}/50`),
          el('span', { className: `text-xs font-semibold ${userScoresArr.length > 0 ? 'text-emerald-500' : 'text-slate-300'}` }, `You: ${userScoresArr.length > 0 ? userSum + '/50' : '--'}`)
        )
      );
      listCol.appendChild(btn);
    });
  }

  renderVendorList();
  renderPanel();
  grid.appendChild(listCol);
  grid.appendChild(panel);
  root.appendChild(grid);
}

// ── Decisions ──────────────────────────────────────────────────────────
function renderDecisions(root) {
  const vendors = Store.getVendors();
  vendors.forEach(v => Store.ensureAIScores(v));

  root.appendChild(el('div', { className: 'mb-6' },
    el('h1', { className: 'text-2xl font-bold text-gray-900' }, 'Buy / Build / Partner Decisions'),
    el('p', { className: 'text-gray-500 text-sm mt-1' }, 'AI recommends a path for each vendor. Choose your own decision to compare.')
  ));

  if (vendors.length === 0) {
    root.appendChild(card(el('p', { className: 'text-gray-400 text-center py-12' }, 'No vendors yet. '),
      el('a', { href: '#/vendors/0/new', className: 'text-indigo-600 hover:underline' }, 'Add a Vendor')));
    return;
  }

  const tableWrap = el('div', {});
  root.appendChild(tableWrap);

  function renderTable() {
    tableWrap.innerHTML = '';
    const vendorData = vendors.map(v => {
      const aiDec = calcDecision(v.id, 'ai');
      const userPick = Store.getUserDecision(v.id);
      return { ...v, aiScore: calcAIScore(v), aiDec, userPick: userPick ? userPick.choice : null };
    });

    // Summary cards
    const aiCounts = { BUY:0, BUILD:0, PARTNER:0 };
    const userCounts = { BUY:0, BUILD:0, PARTNER:0 };
    vendorData.forEach(v => {
      if (v.aiDec) aiCounts[v.aiDec.recommendation]++;
      if (v.userPick) userCounts[v.userPick]++;
    });
    const summary = el('div', { className: 'grid grid-cols-1 md:grid-cols-2 gap-6 mb-6' });
    // AI summary
    const aiSumCard = card(el('div', { className: 'flex items-center gap-2 mb-4' },
      el('span', { className: 'w-2.5 h-2.5 rounded-full bg-indigo-500' }),
      el('h3', { className: 'font-semibold text-slate-800 text-sm' }, 'AI Recommendations')
    ));
    aiSumCard.style.borderTop = '3px solid #6366f1';
    const aiRow = el('div', { className: 'grid grid-cols-3 gap-3' });
    [{ l:'Buy',c:aiCounts.BUY,color:'text-emerald-600' },{ l:'Build',c:aiCounts.BUILD,color:'text-blue-600' },{ l:'Partner',c:aiCounts.PARTNER,color:'text-purple-600' }].forEach(s => {
      aiRow.appendChild(el('div', { className: 'text-center' },
        el('p', { className: `text-2xl font-bold ${s.color}` }, String(s.c)),
        el('p', { className: 'text-[11px] text-slate-400 font-medium uppercase tracking-wider' }, s.l)
      ));
    });
    aiSumCard.appendChild(aiRow);
    summary.appendChild(aiSumCard);
    // User summary
    const userSumCard = card(el('div', { className: 'flex items-center gap-2 mb-4' },
      el('span', { className: 'w-2.5 h-2.5 rounded-full bg-emerald-500' }),
      el('h3', { className: 'font-semibold text-slate-800 text-sm' }, 'Your Decisions')
    ));
    userSumCard.style.borderTop = '3px solid #10b981';
    const hasAnyUser = vendorData.some(v => v.userPick);
    if (hasAnyUser) {
      const userRow = el('div', { className: 'grid grid-cols-3 gap-3' });
      [{ l:'Buy',c:userCounts.BUY,color:'text-emerald-600' },{ l:'Build',c:userCounts.BUILD,color:'text-blue-600' },{ l:'Partner',c:userCounts.PARTNER,color:'text-purple-600' }].forEach(s => {
        userRow.appendChild(el('div', { className: 'text-center' },
          el('p', { className: `text-2xl font-bold ${s.color}` }, String(s.c)),
          el('p', { className: 'text-[11px] text-slate-400 font-medium uppercase tracking-wider' }, s.l)
        ));
      });
      userSumCard.appendChild(userRow);
    } else {
      userSumCard.appendChild(el('p', { className: 'text-sm text-slate-400 text-center py-3' }, 'Click Buy, Build, or Partner below to make your decisions'));
    }
    summary.appendChild(userSumCard);
    tableWrap.appendChild(summary);

    // Vendor decision rows
    vendorData.forEach(v => {
      const rowCard = card(
        el('div', { className: 'flex flex-col md:flex-row md:items-center gap-4' },
          // Vendor info
          el('div', { className: 'md:w-48 flex-shrink-0' },
            el('p', { className: 'font-semibold text-sm text-gray-900' }, v.name),
            v.project ? el('p', { className: 'text-xs text-slate-400' }, v.project) : null,
            el('div', { className: 'flex gap-3 mt-1' },
              el('span', { className: 'text-xs text-indigo-500 font-semibold' }, 'AI: ' + (Store.getAIScores(v.id).reduce((t,s)=>t+s.score,0)) + '/50'),
              el('span', { className: `text-xs font-semibold ${Store.getScores(v.id).length > 0 ? 'text-emerald-500' : 'text-slate-300'}` }, 'You: ' + (Store.getScores(v.id).length > 0 ? Store.getScores(v.id).reduce((t,s)=>t+s.score,0) + '/50' : '--'))
            )
          ),
          // AI recommendation
          el('div', { className: 'flex-1' },
            el('p', { className: 'text-[10px] text-indigo-400 font-semibold uppercase tracking-wider mb-1.5' }, 'AI Recommends'),
            v.aiDec
              ? el('div', { className: 'flex items-center gap-2' },
                  decisionBadge(v.aiDec.recommendation),
                  el('span', { className: 'text-xs text-slate-400' }, v.aiDec.confidence + '% confidence')
                )
              : el('span', { className: 'text-xs text-slate-300' }, 'No AI scores')
          ),
          // User decision picker
          el('div', { className: 'flex-1' },
            el('p', { className: 'text-[10px] text-emerald-500 font-semibold uppercase tracking-wider mb-1.5' }, 'Your Decision'),
            el('div', { className: 'flex gap-2' },
              ...['BUY','BUILD','PARTNER'].map(choice => {
                const colors = {
                  BUY: v.userPick === choice ? 'bg-emerald-500 text-white ring-2 ring-emerald-300 shadow-sm' : 'bg-white text-emerald-700 ring-1 ring-emerald-200 hover:bg-emerald-50',
                  BUILD: v.userPick === choice ? 'bg-blue-500 text-white ring-2 ring-blue-300 shadow-sm' : 'bg-white text-blue-700 ring-1 ring-blue-200 hover:bg-blue-50',
                  PARTNER: v.userPick === choice ? 'bg-purple-500 text-white ring-2 ring-purple-300 shadow-sm' : 'bg-white text-purple-700 ring-1 ring-purple-200 hover:bg-purple-50'
                };
                return el('button', {
                  className: `px-3 py-1.5 rounded-lg text-xs font-bold transition-all duration-200 ${colors[choice]}`,
                  onclick: () => {
                    if (v.userPick === choice) Store.clearUserDecision(v.id);
                    else Store.setUserDecision(v.id, choice);
                    renderTable();
                  }
                }, choice);
              })
            )
          ),
          // Match indicator
          el('div', { className: 'md:w-20 text-center flex-shrink-0' },
            v.aiDec && v.userPick
              ? v.aiDec.recommendation === v.userPick
                ? el('span', { className: 'text-xs font-bold text-emerald-500 bg-emerald-50 px-2.5 py-1 rounded-full' }, 'Aligned')
                : el('span', { className: 'text-xs font-bold text-amber-500 bg-amber-50 px-2.5 py-1 rounded-full' }, 'Differs')
              : el('span', { className: 'text-xs text-slate-300' }, '--')
          )
        )
      );
      tableWrap.appendChild(el('div', { className: 'mb-3' }, rowCard));
    });
  }
  renderTable();
}
</script>
</body>
</html>
