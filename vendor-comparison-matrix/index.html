    )
  ));
  formEl.appendChild(errEl);
  formEl.appendChild(el('div', { className: 'flex gap-3' },
    el('button', { className: 'bg-gradient-to-r from-indigo-500 to-indigo-600 text-white px-5 py-2.5 rounded-xl hover:from-indigo-600 hover:to-indigo-700 font-semibold text-sm shadow-sm shadow-indigo-200 hover:shadow-md hover:shadow-indigo-200 transition-all duration-200', onclick: () => {
      if (!cleanStr(form.name)) { errEl.textContent = 'Campaign name required'; errEl.className = 'text-red-600 text-sm mb-2'; return; }
      const c = Store.saveCampaign({ name: cleanStr(form.name), description: cleanStr(form.description), objective: cleanStr(form.objective) });
      location.hash = `#/campaigns/${c.id}`;
    }}, 'Create Campaign'),
    el('button', { className: 'bg-white/80 text-slate-600 px-5 py-2.5 rounded-xl border border-slate-200 hover:bg-slate-50 hover:border-slate-300 font-medium text-sm transition-all duration-200', onclick: () => history.back() }, 'Cancel')
  ));
  root.appendChild(formEl);
}

function renderCampaignDetail(root, id) {
  const campaign = Store.getCampaign(id);
  if (!campaign) { root.appendChild(el('p', { className: 'text-gray-400' }, 'Campaign not found')); return; }

  root.appendChild(el('div', { className: 'flex items-start justify-between mb-6' },
    el('div', {},
      el('a', { href: '#/campaigns', className: 'text-sm text-indigo-600 hover:underline mb-2 inline-block' }, '\u2190 All Campaigns'),
      el('h1', { className: 'text-2xl font-bold text-gray-900' }, campaign.name),
      campaign.description ? el('p', { className: 'text-gray-500 text-sm mt-1' }, campaign.description) : null,
      campaign.objective ? el('p', { className: 'text-gray-400 text-xs mt-1' }, 'Objective: ' + campaign.objective) : null
    ),
    el('span', { className: `text-xs px-3 py-1 rounded-full ${campaign.status === 'active' ? 'bg-emerald-50 text-emerald-700' : 'bg-gray-100 text-gray-500'}` }, campaign.status)
  ));

  // Add vendor
  const vendorIds = Store.getCampaignVendors(id);
  const allVendors = Store.getVendors();
  const available = allVendors.filter(v => !vendorIds.includes(v.id));

  if (Auth.canManageCampaigns()) {
    const addCard = card(el('h2', { className: 'font-semibold text-gray-900 mb-3' }, 'Add Vendor to Campaign'));
    const select = el('select', { className: 'w-full border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:ring-2 focus:ring-indigo-500/30 focus:border-indigo-400 outline-none bg-white/60 placeholder:text-slate-400 transition-all duration-200 flex-1' });
    select.appendChild(el('option', { value: '' }, 'Select a vendor...'));
    available.forEach(v => select.appendChild(el('option', { value: String(v.id) }, v.name + (v.category ? ' — ' + v.category : ''))));
    addCard.appendChild(el('div', { className: 'flex gap-2' },
      select,
      el('button', { className: 'bg-gradient-to-r from-indigo-500 to-indigo-600 text-white px-5 py-2.5 rounded-xl hover:from-indigo-600 hover:to-indigo-700 font-semibold text-sm shadow-sm shadow-indigo-200 hover:shadow-md hover:shadow-indigo-200 transition-all duration-200', onclick: () => {
        const vid = parseInt(select.value, 10);
        if (vid) { Store.addVendorToCampaign(id, vid); render(); }
      }}, 'Add')
    ));
    if (available.length === 0 && allVendors.length > 0) addCard.appendChild(el('p', { className: 'text-xs text-gray-400 mt-2' }, 'All vendors are in this campaign.'));
    if (allVendors.length === 0) addCard.appendChild(el('p', { className: 'text-xs text-gray-400 mt-2' }, 'No vendors available. Add one first.'));
    root.appendChild(addCard);
  }

  const vendors = vendorIds.map(vid => Store.getVendor(vid)).filter(Boolean);

  // Full-campaign comparison table
  if (vendors.length > 0) {
    const tableCard = card(
      el('div', { className: 'flex items-start justify-between mb-4 gap-3' },
        el('div', {},
          el('h2', { className: 'font-semibold text-gray-900' }, 'All Vendors in Campaign'),
          el('p', { className: 'text-xs text-gray-400 mt-1' }, 'High-level view across everything in this initiative. Use Comparison Groups below for head-to-head between similar vendors.')
        )
      )
    );
    tableCard.appendChild(renderHeadToHeadTable(vendors, Auth.canManageCampaigns() ? (vid) => { Store.removeVendorFromCampaign(id, vid); render(); } : null));
    root.appendChild(tableCard);
  } else {
    root.appendChild(card(el('p', { className: 'text-gray-400 text-center py-12' }, 'No vendors in this campaign yet.')));
  }

  // Comparison Groups — sub-groupings of "similar" vendors within this campaign
  const groups = Store.getComparisonGroups(id);
  const groupsHeader = el('div', { className: 'flex items-start justify-between mt-8 mb-4 gap-3' },
    el('div', {},
      el('h2', { className: 'text-lg font-bold text-gray-900' }, 'Comparison Groups'),
      el('p', { className: 'text-xs text-gray-500 mt-1' }, 'Group similar vendors (e.g., "Claims CRM candidates") for apples-to-apples head-to-head comparison.')
    ),
    // New group inline (admin only)
    Auth.canManageCampaigns() ? (() => {
      const nameInput = el('input', {
        type: 'text', placeholder: 'New group name...',
        className: 'border border-slate-200 rounded-xl px-3 py-2 text-sm bg-white/80 outline-none focus:ring-2 focus:ring-indigo-500/30 focus:border-indigo-400'
      });
      return el('div', { className: 'flex gap-2' },
        nameInput,
        el('button', {
          className: 'bg-gradient-to-r from-indigo-500 to-indigo-600 text-white px-4 py-2 rounded-xl hover:from-indigo-600 hover:to-indigo-700 font-semibold text-sm shadow-sm shadow-indigo-200',
          onclick: () => {
            const name = cleanStr(nameInput.value);
            if (!name) return;
            Store.saveComparisonGroup({ campaignId: id, name, vendorIds: [] });
            render();
          }
        }, '+ Group')
      );
    })() : null
  );
  root.appendChild(groupsHeader);

  if (groups.length === 0) {
    root.appendChild(card(el('p', { className: 'text-gray-400 text-center py-8 text-sm' }, 'No comparison groups yet. Create one above to compare similar vendors head-to-head.')));
  } else {
    groups.forEach(g => {
      const groupVendors = (g.vendorIds || []).map(vid => Store.getVendor(vid)).filter(Boolean);
      const campaignVendorsInGroup = vendors.filter(v => !g.vendorIds.includes(v.id));

      const gCard = card(
        el('div', { className: 'flex items-start justify-between mb-3 gap-3' },
          el('div', { className: 'min-w-0' },
            el('h3', { className: 'font-semibold text-gray-900' }, g.name),
            el('p', { className: 'text-xs text-slate-400 mt-0.5' }, `${groupVendors.length} vendor${groupVendors.length !== 1 ? 's' : ''}`)
          ),
          Auth.canManageCampaigns() ? el('button', {
            className: 'text-xs text-slate-400 hover:text-red-600',
            onclick: () => {
              if (confirm(`Delete comparison group "${g.name}"?`)) { Store.deleteComparisonGroup(g.id); render(); }
            }
          }, 'Delete group') : null
        )
      );

      // Add vendor to group (must already be in campaign, admin only)
      if (Auth.canManageCampaigns() && campaignVendorsInGroup.length > 0) {
        const addSel = el('select', { className: 'border border-slate-200 rounded-lg px-3 py-1.5 text-xs bg-white/80 outline-none' });
        addSel.appendChild(el('option', { value: '' }, 'Add vendor from campaign...'));
        campaignVendorsInGroup.forEach(v => addSel.appendChild(el('option', { value: String(v.id) }, v.name + (v.category ? ' — ' + v.category : ''))));
        gCard.appendChild(el('div', { className: 'flex gap-2 mb-3' },
          addSel,
          el('button', {
            className: 'text-xs font-semibold text-indigo-600 hover:text-indigo-800',
            onclick: () => {
              const vid = parseInt(addSel.value, 10);
              if (vid) { Store.addVendorToGroup(g.id, vid); render(); }
            }
          }, 'Add')
        ));
      } else if (vendors.length > 0) {
        gCard.appendChild(el('p', { className: 'text-xs text-slate-400 mb-2' }, 'All campaign vendors are already in this group.'));
      }

      if (groupVendors.length === 0) {
        gCard.appendChild(el('p', { className: 'text-xs text-gray-400 text-center py-4' }, 'No vendors in this group yet.'));
      } else {
        gCard.appendChild(renderHeadToHeadTable(groupVendors, Auth.canManageCampaigns() ? (vid) => { Store.removeVendorFromGroup(g.id, vid); render(); } : null));
      }
      root.appendChild(el('div', { className: 'mt-4' }, gCard));
    });
  }
}

// ── Compare — executive-oriented similar-vendor view ────────────────────
// Three modes: By Department (uses existing sections), By Category (new field), Pick Vendors (manual).
// Each mode funnels into the same result view: Summary → Top Pick → Ranked List → Full Table.
function renderCompare(root) {
  const allVendors = Store.getVendors();
  allVendors.forEach(v => { Store.ensureAIScores(v); Store.ensureBBPAIScores(v); });

  root.appendChild(el('div', { className: 'mb-6' },
    el('h1', { className: 'text-2xl font-bold text-gray-900' }, 'Compare Vendors'),
    el('p', { className: 'text-gray-500 text-sm mt-1' }, 'Pick what you need and we\u2019ll rank the options for you.')
  ));

  if (allVendors.length === 0) {
    root.appendChild(card(el('p', { className: 'text-gray-400 text-center py-12' }, 'No vendors yet. '),
      el('a', { href: '#/vendors/0/new', className: 'text-indigo-600 hover:underline' }, 'Add a Vendor')));
    return;
  }

  // ── URL state ────────────────────────────────────────────────────────
  // Hash format: #/compare?mode=dept&val=Claims   or   mode=cat&val=Claims%20CRM   or   mode=pick&val=1,3,5
  const queryStr = (location.hash.split('?')[1] || '');
  const queryParams = {};
  queryStr.split('&').forEach(pair => {
    if (!pair) return;
    const [k, v] = pair.split('=');
    queryParams[k] = v ? decodeURIComponent(v) : '';
  });
  let mode = queryParams.mode || 'dept';
  let selectedValue = queryParams.val || '';
  let pickedIds = (mode === 'pick' && selectedValue)
    ? selectedValue.split(',').map(n => parseInt(n, 10)).filter(n => !isNaN(n))
    : [];

  function updateUrl() {
    let val;
    if (mode === 'pick') val = pickedIds.join(',');
    else val = selectedValue;
    location.hash = `#/compare?mode=${mode}${val ? '&val=' + encodeURIComponent(val) : ''}`;
  }

  // ── Mode tabs ────────────────────────────────────────────────────────
  const tabs = [
    { id: 'dept', label: 'By Department', icon: 'M3 3h18v18H3V3zm0 6h18M9 3v18', hint: 'Find vendors tagged to a specific AF Group department' },
    { id: 'cat', label: 'By Category', icon: 'M7 7h10M7 12h10M7 17h10', hint: 'Find vendors by solution type (e.g., Claims CRM)' },
    { id: 'pick', label: 'Pick Vendors', icon: 'M9 12l2 2 4-4', hint: 'Hand-pick 2\u20135 vendors to compare head-to-head' }
  ];
  const tabBar = card(
    el('p', { className: 'text-xs font-semibold text-slate-500 uppercase tracking-wider mb-3' }, 'How do you want to compare?'),
    (() => {
      const row = el('div', { className: 'flex flex-wrap gap-2' });
      tabs.forEach(t => {
        const active = mode === t.id;
        row.appendChild(el('button', {
          className: `flex items-center gap-2 px-4 py-2.5 rounded-xl text-sm font-semibold transition-all duration-200 ${active ? 'bg-gradient-to-r from-indigo-500 to-indigo-600 text-white shadow-md shadow-indigo-200' : 'bg-white text-slate-600 ring-1 ring-slate-200 hover:ring-indigo-200 hover:bg-indigo-50'}`,
          onclick: () => {
            mode = t.id;
            selectedValue = '';
            pickedIds = [];
            updateUrl();
          }
        }, t.label));
      });
      return row;
    })(),
    el('p', { className: 'text-xs text-slate-400 mt-2' }, tabs.find(t => t.id === mode)?.hint || '')
  );
  root.appendChild(tabBar);

  // ── Picker body per mode ─────────────────────────────────────────────
  const pickerBody = el('div', { className: 'mt-5' });
  root.appendChild(pickerBody);

  let selectedVendors = [];
  let headline = '';

  if (mode === 'dept') {
    const usedSections = Store.getUsedSections();
    const pickCard = card(el('h2', { className: 'font-semibold text-gray-900 mb-3' }, 'Choose Department'));
    if (usedSections.length === 0) {
      pickCard.appendChild(el('p', { className: 'text-xs text-slate-400' }, 'No vendors have any departments tagged yet. Edit a vendor and select one or more AF Group Sections.'));
    } else {
      const chips = el('div', { className: 'flex flex-wrap gap-2' });
      usedSections.forEach(s => {
        const count = Store.getVendorsBySection(s).length;
        const active = s === selectedValue;
        chips.appendChild(el('button', {
          className: `text-sm px-3.5 py-2 rounded-xl transition-all duration-200 ${active ? 'bg-indigo-600 text-white ring-2 ring-indigo-300 shadow-sm' : 'bg-white text-slate-700 ring-1 ring-slate-200 hover:bg-indigo-50 hover:ring-indigo-200'}`,
          onclick: () => { selectedValue = s; updateUrl(); }
        }, `${s}`, el('span', { className: `ml-1.5 text-[11px] ${active ? 'text-indigo-100' : 'text-slate-400'}` }, `(${count})`)));
      });
      pickCard.appendChild(chips);
    }
    pickerBody.appendChild(pickCard);

    if (selectedValue) {
      selectedVendors = Store.getVendorsBySection(selectedValue);
      headline = `${selectedValue} Department`;
    }

  } else if (mode === 'cat') {
    const categories = Store.getCategories();
    const pickCard = card(
      el('h2', { className: 'font-semibold text-gray-900 mb-3' }, 'Choose Category'),
      categories.length === 0
        ? el('p', { className: 'text-xs text-slate-400' }, 'No categories set on any vendor yet. Edit a vendor and set a Category like "Claims CRM" to use this view.')
        : (() => {
            const chips = el('div', { className: 'flex flex-wrap gap-2' });
            categories.forEach(c => {
              const count = Store.getVendorsByCategory(c).length;
              const active = c === selectedValue;
              chips.appendChild(el('button', {
                className: `text-sm px-3.5 py-2 rounded-xl transition-all duration-200 ${active ? 'bg-indigo-600 text-white ring-2 ring-indigo-300 shadow-sm' : 'bg-white text-slate-700 ring-1 ring-slate-200 hover:bg-indigo-50 hover:ring-indigo-200'}`,
                onclick: () => { selectedValue = c; updateUrl(); }
              }, `${c}`, el('span', { className: `ml-1.5 text-[11px] ${active ? 'text-indigo-100' : 'text-slate-400'}` }, `(${count})`)));
            });
            return chips;
          })()
    );
    pickerBody.appendChild(pickCard);

    if (selectedValue) {
      selectedVendors = Store.getVendorsByCategory(selectedValue);
      headline = selectedValue;
    }

  } else if (mode === 'pick') {
    let pickSearch = '';
    const pickCard = card(
      el('div', { className: 'flex items-start justify-between mb-3 gap-3 flex-wrap' },
        el('div', {},
          el('h2', { className: 'font-semibold text-gray-900' }, 'Pick Vendors to Compare'),
          el('p', { className: 'text-xs text-slate-400 mt-0.5' }, `${pickedIds.length} selected — tick up to 5 for cleanest comparison`)
        )
      )
    );
    const searchEl = el('input', {
      type: 'text', placeholder: 'Search by name, category, or project...',
      className: 'w-full border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:ring-2 focus:ring-indigo-500/30 focus:border-indigo-400 outline-none bg-white/60 placeholder:text-slate-400 mb-3',
      oninput: e => { pickSearch = e.target.value.toLowerCase(); renderPickList(); }
    });
    pickCard.appendChild(searchEl);
    const pickListEl = el('div', { className: 'grid grid-cols-1 md:grid-cols-2 gap-2 max-h-[340px] overflow-y-auto pr-1' });
    pickCard.appendChild(pickListEl);

    function renderPickList() {
      pickListEl.innerHTML = '';
      const matches = allVendors.filter(v => {
        if (!pickSearch) return true;
        const hay = `${v.name} ${v.category || ''} ${v.project || ''}`.toLowerCase();
        return hay.includes(pickSearch);
      });
      if (matches.length === 0) {
        pickListEl.appendChild(el('p', { className: 'text-xs text-slate-400 p-3 col-span-full' }, 'No matches.'));
        return;
      }
      matches.slice(0, 150).forEach(v => {
        const isPicked = pickedIds.includes(v.id);
        pickListEl.appendChild(el('label', {
          className: `flex items-center gap-2 p-2.5 rounded-xl cursor-pointer transition-all duration-200 ${isPicked ? 'bg-indigo-50 ring-2 ring-indigo-300' : 'bg-white ring-1 ring-slate-200 hover:ring-indigo-200 hover:bg-indigo-50/30'}`
        },
          Object.assign(el('input', { type: 'checkbox' }), {
            checked: isPicked,
            onchange: (e) => {
              if (e.target.checked) pickedIds.push(v.id);
              else pickedIds = pickedIds.filter(id => id !== v.id);
              updateUrl();
            }
          }),
          el('div', { className: 'min-w-0 flex-1' },
            el('p', { className: 'text-sm font-medium text-gray-900 truncate' }, v.name),
            el('p', { className: 'text-[11px] text-slate-400 truncate' }, v.category || (v.sections || []).slice(0, 2).join(', ') || '\u00a0')
          )
        ));
      });
      if (matches.length > 150) {
        pickListEl.appendChild(el('p', { className: 'text-[11px] text-slate-400 text-center p-2 col-span-full' }, `+${matches.length - 150} more — refine search`));
      }
    }
    renderPickList();
    pickerBody.appendChild(pickCard);

    if (pickedIds.length > 0) {
      selectedVendors = pickedIds.map(id => Store.getVendor(id)).filter(Boolean);
      headline = 'Selected Vendors';
    }
  }

  // ── Empty state ──────────────────────────────────────────────────────
  if (selectedVendors.length === 0) {
    pickerBody.appendChild(el('div', { className: 'mt-6' },
      card(el('p', { className: 'text-gray-400 text-center py-12' },
        mode === 'pick' ? 'Tick some vendors above to compare them.' : 'Pick an option above to see a ranked comparison.'
      ))
    ));
    return;
  }

  // ── Build ranked data ────────────────────────────────────────────────
  // Rank by each vendor's strongest BBP path score — this is their most confident "fit"
  const ranked = selectedVendors.map(v => {
    const dec = calcDecision(v.id);
    const strongest = dec ? Math.max(dec.raw.BUY, dec.raw.BUILD, dec.raw.PARTNER) : 0;
    const userScores = Store.getScores(v.id);
    const aiScores = Store.getAIScores(v.id);
    const genScore = userScores.length > 0
      ? userScores.reduce((t, s) => t + s.score, 0)
      : aiScores.reduce((t, s) => t + s.score, 0);
    return { v, dec, strongest, genScore, hasUserScores: userScores.length > 0 };
  }).sort((a, b) => b.strongest - a.strongest || b.genScore - a.genScore);

  const parseNum = s => { const n = parseFloat(String(s || '').replace(/[^0-9.]/g, '')); return isFinite(n) ? n : null; };

  // ── Executive Summary strip ──────────────────────────────────────────
  const recCounts = { BUY: 0, BUILD: 0, PARTNER: 0 };
  ranked.forEach(r => { if (r.dec) recCounts[r.dec.recommendation]++; });
  const costs = ranked.map(r => parseNum(r.v.estAnnualCost)).filter(n => n != null);
  const avgCost = costs.length > 0 ? Math.round(costs.reduce((a, b) => a + b, 0) / costs.length) : null;
  const avgGen = ranked.length > 0 ? Math.round(ranked.reduce((t, r) => t + r.genScore, 0) / ranked.length) : 0;
  const topRecText = ['BUY','BUILD','PARTNER'].reduce((best, k) => recCounts[k] > (recCounts[best] || 0) ? k : best, 'BUY');

  const summaryStrip = el('div', { className: 'grid grid-cols-2 md:grid-cols-4 gap-3 mt-6 mb-6' });
  const statCard = (label, value, sub, color) => el('div', { className: 'bg-white/80 backdrop-blur-sm rounded-2xl shadow-sm border border-white/60 p-4' },
    el('p', { className: 'text-[10px] font-semibold text-slate-400 uppercase tracking-wider' }, label),
    el('p', { className: `text-2xl font-bold mt-1 ${color || 'text-slate-800'}` }, value),
    sub ? el('p', { className: 'text-[11px] text-slate-400 mt-0.5' }, sub) : null
  );
  summaryStrip.appendChild(statCard('Options', String(ranked.length), `in ${headline}`, 'text-indigo-600'));
  summaryStrip.appendChild(statCard('Avg Score', `${avgGen}/50`,
    ranked.some(r => r.hasUserScores) ? 'from your scores' : 'AI estimate',
    'text-emerald-600'));
  summaryStrip.appendChild(statCard('Most Recommend',
    recCounts[topRecText] > 0 ? topRecText : '\u2014',
    recCounts[topRecText] > 0 ? `${recCounts[topRecText]} of ${ranked.length}` : '',
    topRecText === 'BUY' ? 'text-emerald-600' : topRecText === 'BUILD' ? 'text-blue-600' : 'text-purple-600'));
  summaryStrip.appendChild(statCard('Avg Est. Cost',
    avgCost != null ? '$' + avgCost.toLocaleString() : '\u2014',
    costs.length > 0 ? `${costs.length} of ${ranked.length} priced` : 'no pricing yet',
    'text-amber-600'));
  pickerBody.appendChild(summaryStrip);

  // ── Top Pick hero card ───────────────────────────────────────────────
  const top = ranked[0];
  if (top && top.dec) {
    const recColor = { BUY: 'emerald', BUILD: 'blue', PARTNER: 'purple' }[top.dec.recommendation];
    const hero = el('div', {
      className: `relative overflow-hidden rounded-3xl p-6 md:p-8 mb-6 bg-gradient-to-br from-${recColor}-500 via-${recColor}-600 to-${recColor}-700 shadow-xl shadow-${recColor}-200`
    },
      el('div', { className: 'flex flex-wrap items-center justify-between gap-4 relative z-10' },
        el('div', { className: 'min-w-0 flex-1' },
          el('p', { className: 'text-xs font-bold uppercase tracking-[0.2em] text-white/70 mb-2' }, '\u2605 Top Pick'),
          el('a', { href: `#/vendors/${top.v.id}/edit`, className: 'text-3xl md:text-4xl font-bold text-white no-underline hover:underline block' }, top.v.name),
          el('p', { className: 'text-sm text-white/80 mt-1' },
            top.v.category || (top.v.sections || []).slice(0, 2).join(' \u00b7 ') || '\u00a0'
          ),
          el('div', { className: 'flex flex-wrap items-center gap-2 mt-4' },
            el('span', { className: 'bg-white/20 backdrop-blur-sm text-white text-xs font-bold px-3 py-1.5 rounded-full ring-1 ring-white/30' },
              'Recommends: ' + top.dec.recommendation),
            el('span', { className: 'bg-white/20 backdrop-blur-sm text-white text-xs font-bold px-3 py-1.5 rounded-full ring-1 ring-white/30' },
              top.dec.confidence + '% confidence'),
            el('span', { className: 'bg-white/20 backdrop-blur-sm text-white text-xs font-bold px-3 py-1.5 rounded-full ring-1 ring-white/30' },
              `${top.strongest}/${BBP_MAX} best-path score`)
          )
        ),
        el('div', { className: 'text-right flex-shrink-0' },
          el('p', { className: 'text-[10px] font-bold uppercase tracking-wider text-white/60 mb-1' }, 'Overall'),
          el('p', { className: 'text-5xl md:text-6xl font-bold text-white leading-none' }, String(top.genScore)),
          el('p', { className: 'text-xs text-white/70 mt-1' }, 'out of 50')
        )
      )
    );
    // Decorative bg accent
    hero.appendChild(el('div', {
      className: 'absolute -right-16 -top-16 w-64 h-64 rounded-full bg-white/10 blur-3xl pointer-events-none'
    }));
    pickerBody.appendChild(hero);
  }

  // ── Ranked list ──────────────────────────────────────────────────────
  const leaderboard = card(
    el('div', { className: 'flex items-center justify-between mb-4' },
      el('h2', { className: 'font-semibold text-gray-900' }, 'Ranked Leaderboard'),
      el('p', { className: 'text-xs text-slate-400' }, 'Sorted by strongest fit score')
    )
  );
  const maxStrongest = Math.max(...ranked.map(r => r.strongest), 1);
  ranked.forEach((r, idx) => {
    const rank = idx + 1;
    const rankBg = rank === 1 ? 'bg-gradient-to-br from-amber-400 to-amber-500 text-white shadow-md shadow-amber-200'
      : rank === 2 ? 'bg-gradient-to-br from-slate-300 to-slate-400 text-white'
      : rank === 3 ? 'bg-gradient-to-br from-orange-400 to-orange-500 text-white'
      : 'bg-slate-100 text-slate-500';
    const recColor = r.dec ? { BUY: 'emerald', BUILD: 'blue', PARTNER: 'purple' }[r.dec.recommendation] : 'slate';
    const pctBuy = r.dec ? (r.dec.raw.BUY / BBP_MAX) * 100 : 0;
    const pctBuild = r.dec ? (r.dec.raw.BUILD / BBP_MAX) * 100 : 0;
    const pctPartner = r.dec ? (r.dec.raw.PARTNER / BBP_MAX) * 100 : 0;
    const strongestPct = (r.strongest / maxStrongest) * 100;

    const row = el('div', { className: `flex flex-col md:flex-row md:items-center gap-4 p-4 rounded-2xl border transition-all duration-200 hover:shadow-md ${rank === 1 ? 'border-amber-200 bg-amber-50/30' : 'border-slate-100 hover:border-indigo-200'} mb-3` },
      // Rank badge
      el('div', { className: `w-12 h-12 rounded-2xl flex-shrink-0 flex items-center justify-center text-lg font-bold ${rankBg}` }, '#' + rank),
      // Vendor name + meta
      el('div', { className: 'flex-1 min-w-0' },
        el('a', { href: `#/vendors/${r.v.id}/edit`, className: 'font-semibold text-gray-900 hover:text-indigo-600 no-underline text-base' }, r.v.name),
        el('p', { className: 'text-xs text-slate-400 truncate mt-0.5' },
          r.v.category || (r.v.sections || []).slice(0, 2).join(' \u00b7 ') || '\u00a0'
        ),
        // Three path bars — visual, not numeric
        el('div', { className: 'flex gap-1 mt-2 max-w-xs' },
          el('div', { className: 'flex-1' },
            el('p', { className: 'text-[9px] font-bold text-emerald-600 uppercase' }, 'Buy'),
            Object.assign(el('div', { className: 'w-full h-1.5 bg-slate-100 rounded-full overflow-hidden' }),
              (() => { const bar = el('div', { className: 'h-1.5 bg-emerald-500 bar-fill' }); bar.style.width = pctBuy + '%'; return bar; })()
            )
          ),
          el('div', { className: 'flex-1' },
            el('p', { className: 'text-[9px] font-bold text-blue-600 uppercase' }, 'Build'),
            Object.assign(el('div', { className: 'w-full h-1.5 bg-slate-100 rounded-full overflow-hidden' }),
              (() => { const bar = el('div', { className: 'h-1.5 bg-blue-500 bar-fill' }); bar.style.width = pctBuild + '%'; return bar; })()
            )
          ),
          el('div', { className: 'flex-1' },
            el('p', { className: 'text-[9px] font-bold text-purple-600 uppercase' }, 'Partner'),
            Object.assign(el('div', { className: 'w-full h-1.5 bg-slate-100 rounded-full overflow-hidden' }),
              (() => { const bar = el('div', { className: 'h-1.5 bg-purple-500 bar-fill' }); bar.style.width = pctPartner + '%'; return bar; })()
            )
          )
        )
      ),
      // Key metrics
      el('div', { className: 'flex-shrink-0 text-right' },
        r.v.estAnnualCost ? el('p', { className: 'text-xs text-slate-500' }, '$' + (parseNum(r.v.estAnnualCost) != null ? parseNum(r.v.estAnnualCost).toLocaleString() : r.v.estAnnualCost) + '/yr') : null,
        r.v.timeToDeploy ? el('p', { className: 'text-xs text-slate-400' }, r.v.timeToDeploy + ' wk deploy') : null
      ),
      // Recommendation pill
      r.dec
        ? el('div', { className: 'flex-shrink-0 text-right' },
            el('span', { className: `inline-block px-3 py-1.5 rounded-full text-xs font-bold bg-${recColor}-50 text-${recColor}-700 ring-1 ring-${recColor}-200` }, r.dec.recommendation),
            el('p', { className: 'text-[10px] text-slate-400 mt-1' }, r.dec.confidence + '% confident')
          )
        : el('span', { className: 'text-xs text-slate-300 flex-shrink-0' }, 'unscored')
    );
    leaderboard.appendChild(row);
  });
  pickerBody.appendChild(leaderboard);

  // ── Collapsible full head-to-head table ──────────────────────────────
  const detailsWrap = el('div', { className: 'mt-6' });
  const isOpenInit = ranked.length <= 4;
  const detailsCard = card();
  const toggleBtn = el('button', {
    className: 'w-full flex items-center justify-between text-left',
    onclick: () => {
      const body = detailsCard.querySelector('.details-body');
      const arrow = detailsCard.querySelector('.details-arrow');
      if (body.style.display === 'none') {
        body.style.display = 'block';
        arrow.textContent = '\u25b2';
      } else {
        body.style.display = 'none';
        arrow.textContent = '\u25bc';
      }
    }
  },
    el('div', {},
      el('h2', { className: 'font-semibold text-gray-900' }, 'Full Side-by-Side Details'),
      el('p', { className: 'text-xs text-slate-400 mt-0.5' }, 'Every metric, every path, every vendor')
    ),
    el('span', { className: 'details-arrow text-slate-400 text-sm' }, isOpenInit ? '\u25b2' : '\u25bc')
  );
  detailsCard.appendChild(toggleBtn);
  const detailsBody = el('div', { className: 'details-body mt-4' });
  detailsBody.style.display = isOpenInit ? 'block' : 'none';
  detailsBody.appendChild(renderHeadToHeadTable(ranked.map(r => r.v)));
  detailsCard.appendChild(detailsBody);
  detailsWrap.appendChild(detailsCard);
  pickerBody.appendChild(detailsWrap);
}

// ── Scoring ────────────────────────────────────────────────────────────
function renderScoring(root) {
  const allVendors = Store.getVendors();
  allVendors.forEach(v => { Store.ensureAIScores(v); Store.ensureBBPAIScores(v); });
  let selectedId = null;
  let searchTerm = '';

  root.appendChild(el('div', { className: 'mb-6' },
    el('h1', { className: 'text-2xl font-bold text-gray-900' }, 'Scoring Matrix'),
    el('p', { className: 'text-gray-500 text-sm mt-1' }, 'Rate each vendor across General Evaluation plus the dedicated Buy / Build / Partner frameworks.')
  ));

  if (allVendors.length === 0) {
    root.appendChild(card(el('p', { className: 'text-gray-400 text-center py-12' }, 'No vendors to score. '),
      el('a', { href: '#/vendors/0/new', className: 'text-indigo-600 hover:underline' }, 'Add a Vendor')));
    return;
  }

  const grid = el('div', { className: 'flex flex-col lg:grid lg:grid-cols-4 gap-6' });
  const listCol = el('div', { className: 'flex flex-col gap-2' });
  listCol.appendChild(el('p', { className: 'text-xs font-medium text-gray-500 uppercase tracking-wide mb-1' }, 'Select Vendor'));
  const searchInput = el('input', {
    type: 'text', placeholder: 'Search vendors...',
    className: 'w-full border border-slate-200 rounded-xl px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-500/30 focus:border-indigo-400 outline-none bg-white/80 placeholder:text-slate-400 mb-2',
    oninput: e => { searchTerm = e.target.value.toLowerCase(); renderVendorList(); }
  });
  listCol.appendChild(searchInput);
  const listScroll = el('div', { className: 'flex flex-col gap-2 max-h-[600px] overflow-y-auto pr-1' });
  listCol.appendChild(listScroll);
  const panel = el('div', { className: 'lg:col-span-3' });

  // Helper — render a scoring block (AI col + user-editable col) for an arbitrary criteria list
  function renderScoreBlock(title, subtitle, criteriaList, path, accentClass) {
    // path = null → generic 10-criteria block (uses Store.getScores/setScore)
    // path = 'BUY'|'BUILD'|'PARTNER' → BBP block (uses Store.getBBPScores/setBBPScore)
    const isBBP = !!path;
    let aiMap = {}, userMap = {};
    if (isBBP) {
      Store.getBBPScores(selectedId, path, 'ai').forEach(r => { aiMap[r.criterion] = r.score; });
      Store.getBBPScores(selectedId, path, 'user').forEach(r => { userMap[r.criterion] = r.score; });
    } else {
      Store.getAIScores(selectedId).forEach(r => { aiMap[r.criterion] = r.score; });
      Store.getScores(selectedId).forEach(r => { userMap[r.criterion] = r.score; });
    }

    let aiSum = 0, userSum = 0, userCount = 0;
    criteriaList.forEach(c => {
      const aiV = aiMap[c] || 0;
      const uV = userMap[c] || 0;
      if (isBBP && BBP_INVERTED[path].has(c)) {
        aiSum += aiV ? (6 - aiV) : 0;
        if (uV) { userSum += (6 - uV); userCount++; }
      } else {
        aiSum += aiV;
        if (uV) { userSum += uV; userCount++; }
      }
    });
    const maxTotal = isBBP ? BBP_MAX : 50;

    const block = card(
      el('div', { className: 'flex items-start justify-between mb-3 gap-3' },
        el('div', { className: 'min-w-0' },
          el('h3', { className: `font-semibold text-base ${accentClass}` }, title),
          el('p', { className: 'text-xs text-gray-400 mt-0.5' }, subtitle)
        ),
        el('div', { className: 'flex items-center gap-3 flex-shrink-0' },
          el('div', { className: 'text-center' },
            el('p', { className: 'text-[10px] text-indigo-400 font-semibold uppercase' }, 'AI'),
            el('p', { className: 'text-sm font-bold text-indigo-600' }, `${aiSum}/${maxTotal}`)
          ),
          el('div', { className: 'text-center' },
            el('p', { className: 'text-[10px] text-emerald-500 font-semibold uppercase' }, 'You'),
            el('p', { className: `text-sm font-bold ${userCount > 0 ? 'text-emerald-600' : 'text-slate-300'}` }, userCount > 0 ? `${userSum}/${maxTotal}` : '--')
          )
        )
      )
    );

    block.appendChild(el('div', { className: 'hidden md:flex items-center py-2 mb-1 border-b-2 border-slate-200' },
      el('div', { className: 'flex-1' }, el('span', { className: 'text-xs font-semibold text-slate-500 uppercase tracking-wider' }, 'Criterion')),
      el('div', { className: 'w-12 text-center' }, el('span', { className: 'text-xs font-semibold text-indigo-500 uppercase tracking-wider' }, 'AI')),
      el('div', { className: 'w-52 text-center' }, el('span', { className: 'text-xs font-semibold text-emerald-600 uppercase tracking-wider' }, 'Your Score'))
    ));

    criteriaList.forEach(c => {
      const aiVal = aiMap[c] || 0;
      const userVal = userMap[c] || 0;
      const inverted = isBBP && BBP_INVERTED[path].has(c);
      const labelEl = el('div', { className: 'flex-1' },
        el('p', { className: 'text-sm font-medium text-gray-700' }, c),
        inverted ? el('p', { className: 'text-[10px] text-amber-500 font-semibold uppercase' }, 'Higher = worse fit') : null
      );
      block.appendChild(el('div', { className: 'flex flex-wrap md:flex-nowrap items-center py-2.5 border-b border-slate-100/80 gap-2' },
        el('div', { className: 'w-full md:w-auto md:flex-1 md:mr-3 flex items-center justify-between md:block' },
          labelEl,
          el('span', { className: 'ai-pill md:hidden' }, String(aiVal))
        ),
        el('div', { className: 'w-12 hidden md:flex justify-center' }, el('span', { className: 'ai-pill' }, String(aiVal))),
        el('div', { className: 'w-full md:w-52 flex justify-center' },
          Auth.canScore()
            ? scoreButtons(userVal, score => {
                if (isBBP) Store.setBBPScore(selectedId, path, c, score, 'user');
                else Store.setScore(selectedId, c, score);
                renderVendorList();
                renderPanel();
              })
            : el('span', { className: 'user-pill' }, userVal ? String(userVal) : '-')
        )
      ));
    });

    block.appendChild(el('div', { className: 'flex items-center py-3 mt-1 bg-slate-50/80 rounded-xl px-3' },
      el('div', { className: 'flex-1' }, el('p', { className: 'text-sm font-bold text-slate-700' }, 'Total')),
      el('div', { className: 'w-12 text-center' }, el('span', { className: 'text-sm font-bold text-indigo-600' }, `${aiSum}/${maxTotal}`)),
      el('div', { className: 'w-auto md:w-52 text-center' }, el('span', { className: 'text-sm font-bold text-emerald-600' }, userCount > 0 ? `${userSum}/${maxTotal}` : '--'))
    ));

    return block;
  }

  function renderPanel() {
    panel.innerHTML = '';
    if (!selectedId) {
      panel.appendChild(card(el('p', { className: 'text-gray-400 text-center py-16' }, 'Select a vendor from the list to start scoring')));
      return;
    }
    const vendor = Store.getVendor(selectedId);
    if (!vendor) return;
    Store.ensureAIScores(vendor);
    Store.ensureBBPAIScores(vendor);

    // Vendor header
    panel.appendChild(card(
      el('div', { className: 'flex flex-wrap items-start justify-between gap-3' },
        el('div', { className: 'min-w-0' },
          el('h2', { className: 'font-semibold text-gray-900 text-lg' }, vendor.name),
          el('div', { className: 'flex flex-wrap items-center gap-2 mt-1' },
            vendor.category ? el('span', { className: 'text-xs bg-indigo-50 text-indigo-700 px-2 py-0.5 rounded-full' }, vendor.category) : null,
            vendor.project ? el('p', { className: 'text-xs text-gray-400' }, vendor.project) : null
          )
        ),
        el('a', { href: `#/vendors/${selectedId}/edit`, className: 'text-xs text-indigo-600 hover:underline' }, 'Edit vendor')
      )
    ));

    // Section tabs — General Eval, Buy, Build, Partner
    const sectionTabs = [
      { id: 'gen', label: 'General Eval', color: 'indigo' },
      { id: 'buy', label: 'Buy Readiness', color: 'emerald' },
      { id: 'build', label: 'Build Readiness', color: 'blue' },
      { id: 'partner', label: 'Partner Readiness', color: 'purple' }
    ];
    const tabsEl = el('div', { className: 'flex flex-wrap gap-2 mt-4' });
    sectionTabs.forEach(t => {
      tabsEl.appendChild(el('a', {
        href: `#scoring-${t.id}`,
        className: `text-xs px-3 py-1.5 rounded-full bg-${t.color}-50 text-${t.color}-700 ring-1 ring-${t.color}-200 hover:bg-${t.color}-100 no-underline`
      }, t.label));
    });
    panel.appendChild(el('div', { className: 'mt-3' }, tabsEl));

    // General Evaluation (existing 10 criteria)
    const genWrap = el('div', { className: 'mt-5' });
    genWrap.id = 'scoring-gen';
    genWrap.appendChild(renderScoreBlock('General Evaluation', '10 cross-cutting criteria applied to every vendor', CRITERIA, null, 'text-indigo-700'));
    panel.appendChild(genWrap);

    // Buy Readiness
    const buyWrap = el('div', { className: 'mt-5' });
    buyWrap.id = 'scoring-buy';
    buyWrap.appendChild(renderScoreBlock('Buy Readiness', 'How ready is this vendor to be bought off-the-shelf?', BUY_CRITERIA, 'BUY', 'text-emerald-700'));
    panel.appendChild(buyWrap);

    // Build Readiness
    const buildWrap = el('div', { className: 'mt-5' });
    buildWrap.id = 'scoring-build';
    buildWrap.appendChild(renderScoreBlock('Build Readiness', 'How well could we build this capability in-house instead?', BUILD_CRITERIA, 'BUILD', 'text-blue-700'));
    panel.appendChild(buildWrap);

    // Partner Readiness
    const partnerWrap = el('div', { className: 'mt-5' });
    partnerWrap.id = 'scoring-partner';
    partnerWrap.appendChild(renderScoreBlock('Partner Readiness', 'How strong would a strategic partnership be with this vendor?', PARTNER_CRITERIA, 'PARTNER', 'text-purple-700'));
    panel.appendChild(partnerWrap);

    // Final Decision card driven by BBP scores
    const dec = calcDecision(selectedId);
    if (dec) {
      const decCard = card(el('h3', { className: 'font-semibold text-gray-900 mb-3' }, 'Framework Decision'));
      decCard.style.borderTop = '3px solid #6366f1';
      decCard.appendChild(el('p', { className: 'text-xs text-slate-400 mb-4' },
        dec.source === 'user' ? 'Based on your scores' : 'Based on AI defaults — add your scores above to refine'
      ));
      [{ l:'Buy',s:dec.scores.buy,bg:'bg-emerald-500' },{ l:'Build',s:dec.scores.build,bg:'bg-blue-500' },{ l:'Partner',s:dec.scores.partner,bg:'bg-purple-500' }].forEach(d => {
        decCard.appendChild(el('div', { className: 'mb-3' },
          el('div', { className: 'flex justify-between text-xs mb-1' },
            el('span', { className: 'font-medium text-slate-600' }, d.l),
            el('span', { className: 'font-bold text-slate-800' }, d.s + '%')),
          el('div', { className: 'w-full bg-gray-100 rounded-full h-2.5 overflow-hidden' },
            Object.assign(el('div', { className: `${d.bg} h-2.5 rounded-full bar-fill` }), { style: { width: d.s + '%' } }))
        ));
      });
      const recColor = { BUY:'text-emerald-600', BUILD:'text-blue-600', PARTNER:'text-purple-600' };
      decCard.appendChild(el('div', { className: 'p-3 bg-gradient-to-r from-indigo-50 to-violet-50 rounded-xl border border-indigo-100 text-center mt-2' },
        el('p', { className: 'text-xs text-slate-500' }, 'Framework Recommends'),
        el('p', { className: `font-bold text-xl ${recColor[dec.recommendation]}` }, dec.recommendation),
        el('p', { className: 'text-xs text-slate-400' }, dec.confidence + '% confidence')
      ));
      panel.appendChild(el('div', { className: 'mt-6' }, decCard));
    }
  }

  function filterVendors() {
    if (!searchTerm) return allVendors;
    return allVendors.filter(v =>
      v.name.toLowerCase().includes(searchTerm) ||
      (v.category || '').toLowerCase().includes(searchTerm) ||
      (v.project || '').toLowerCase().includes(searchTerm)
    );
  }

  function renderVendorList() {
    listScroll.innerHTML = '';
    const filtered = filterVendors();
    if (filtered.length === 0) {
      listScroll.appendChild(el('p', { className: 'text-xs text-slate-400 p-3' }, 'No matches'));
      return;
    }
    // Cap rendered rows for performance with 100s of vendors
    const CAP = 150;
    const shown = filtered.slice(0, CAP);
    shown.forEach(v => {
      const userCount = Store.getScores(v.id).length
        + Store.getBBPScores(v.id, 'BUY', 'user').length
        + Store.getBBPScores(v.id, 'BUILD', 'user').length
        + Store.getBBPScores(v.id, 'PARTNER', 'user').length;
      const dec = calcDecision(v.id);
      const btn = el('button', {
        className: `vendor-item text-left p-3 rounded-xl transition-all duration-200 ${selectedId === v.id ? 'bg-indigo-50 border-2 border-indigo-300 shadow-sm shadow-indigo-100' : 'bg-white/80 border border-gray-200/80 hover:border-indigo-200 hover:bg-indigo-50/30'}`,
        onclick: () => { selectedId = v.id; renderVendorList(); renderPanel(); }
      },
        el('p', { className: 'font-medium text-sm text-gray-900 truncate' }, v.name),
        v.category ? el('p', { className: 'text-[11px] text-slate-400 truncate' }, v.category) : null,
        el('div', { className: 'flex items-center gap-2 mt-1.5' },
          dec ? decisionBadge(dec.recommendation) : null,
          el('span', { className: `text-[10px] font-semibold ${userCount > 0 ? 'text-emerald-500' : 'text-slate-300'}` }, userCount > 0 ? `${userCount} rated` : 'unscored')
        )
      );
      listScroll.appendChild(btn);
    });
    if (filtered.length > CAP) {
      listScroll.appendChild(el('p', { className: 'text-[11px] text-slate-400 text-center p-2' }, `+${filtered.length - CAP} more — refine search`));
    }
  }

  renderVendorList();
  renderPanel();
  grid.appendChild(listCol);
  grid.appendChild(panel);
  root.appendChild(grid);
}

// ── Decisions ──────────────────────────────────────────────────────────
function renderDecisions(root) {
  const vendors = Store.getVendors();
  vendors.forEach(v => { Store.ensureAIScores(v); Store.ensureBBPAIScores(v); });

  root.appendChild(el('div', { className: 'mb-6' },
    el('h1', { className: 'text-2xl font-bold text-gray-900' }, 'Buy / Build / Partner Decisions'),
    el('p', { className: 'text-gray-500 text-sm mt-1' }, 'Framework recommends a path for each vendor based on dedicated Buy / Build / Partner criteria. Choose your own decision to compare.')
  ));

  if (vendors.length === 0) {
    root.appendChild(card(el('p', { className: 'text-gray-400 text-center py-12' }, 'No vendors yet. '),
      el('a', { href: '#/vendors/0/new', className: 'text-indigo-600 hover:underline' }, 'Add a Vendor')));
    return;
  }

  // Filter state
  let searchTerm = '';
  let filterRec = ''; // '' | BUY | BUILD | PARTNER
  let filterCategory = '';

  const filterCard = card(el('h3', { className: 'text-xs font-semibold text-slate-500 uppercase tracking-wider mb-3' }, 'Filter'));
  const filterRow = el('div', { className: 'flex flex-wrap gap-2' });
  filterRow.appendChild(el('input', {
    type: 'text', placeholder: 'Search name, project, category...',
    className: 'border border-slate-200 rounded-xl px-3 py-2 text-sm bg-white/80 outline-none focus:ring-2 focus:ring-indigo-500/30 focus:border-indigo-400 flex-1 min-w-[200px]',
    oninput: e => { searchTerm = e.target.value.toLowerCase(); renderTable(); }
  }));
  const recSelect = el('select', {
    className: 'border border-slate-200 rounded-xl px-3 py-2 text-sm bg-white/80 outline-none',
    onchange: e => { filterRec = e.target.value; renderTable(); }
  });
  recSelect.appendChild(el('option', { value: '' }, 'All recommendations'));
  ['BUY','BUILD','PARTNER'].forEach(r => recSelect.appendChild(el('option', { value: r }, r)));
  filterRow.appendChild(recSelect);
  const catSelect = el('select', {
    className: 'border border-slate-200 rounded-xl px-3 py-2 text-sm bg-white/80 outline-none',
    onchange: e => { filterCategory = e.target.value; renderTable(); }
  });
  catSelect.appendChild(el('option', { value: '' }, 'All categories'));
  Array.from(new Set([...VENDOR_CATEGORIES, ...Store.getCategories()])).sort().forEach(c => catSelect.appendChild(el('option', { value: c }, c)));
  filterRow.appendChild(catSelect);
  filterCard.appendChild(filterRow);
  root.appendChild(filterCard);

  const tableWrap = el('div', { className: 'mt-6' });
  root.appendChild(tableWrap);

  function renderTable() {
    tableWrap.innerHTML = '';

    const vendorData = vendors.map(v => {
      const dec = calcDecision(v.id);
      const userPick = Store.getUserDecision(v.id);
      return { v, dec, userPick: userPick ? userPick.choice : null };
    });

    // Apply filters
    const filtered = vendorData.filter(x => {
      if (searchTerm) {
        const hay = `${x.v.name} ${x.v.project || ''} ${x.v.category || ''}`.toLowerCase();
        if (!hay.includes(searchTerm)) return false;
      }
      if (filterRec && (!x.dec || x.dec.recommendation !== filterRec)) return false;
      if (filterCategory && (x.v.category || '') !== filterCategory) return false;
      return true;
    });

    // Summary cards (computed over filtered set)
    const recCounts = { BUY:0, BUILD:0, PARTNER:0 };
    const userCounts = { BUY:0, BUILD:0, PARTNER:0 };
    filtered.forEach(x => {
      if (x.dec) recCounts[x.dec.recommendation]++;
      if (x.userPick) userCounts[x.userPick]++;
    });
    const summary = el('div', { className: 'grid grid-cols-1 md:grid-cols-2 gap-6 mb-6' });
    const frameworkCard = card(el('div', { className: 'flex items-center gap-2 mb-4' },
      el('span', { className: 'w-2.5 h-2.5 rounded-full bg-indigo-500' }),
      el('h3', { className: 'font-semibold text-slate-800 text-sm' }, 'Framework Recommendations'),
      el('span', { className: 'ml-auto text-xs text-slate-400' }, `${filtered.length} vendor${filtered.length !== 1 ? 's' : ''}`)
    ));
    frameworkCard.style.borderTop = '3px solid #6366f1';
    const recRow = el('div', { className: 'grid grid-cols-3 gap-3' });
    [{ l:'Buy',c:recCounts.BUY,color:'text-emerald-600' },{ l:'Build',c:recCounts.BUILD,color:'text-blue-600' },{ l:'Partner',c:recCounts.PARTNER,color:'text-purple-600' }].forEach(s => {
      recRow.appendChild(el('div', { className: 'text-center' },
        el('p', { className: `text-2xl font-bold ${s.color}` }, String(s.c)),
        el('p', { className: 'text-[11px] text-slate-400 font-medium uppercase tracking-wider' }, s.l)
      ));
    });
    frameworkCard.appendChild(recRow);
    summary.appendChild(frameworkCard);

    const userSumCard = card(el('div', { className: 'flex items-center gap-2 mb-4' },
      el('span', { className: 'w-2.5 h-2.5 rounded-full bg-emerald-500' }),
      el('h3', { className: 'font-semibold text-slate-800 text-sm' }, 'Your Decisions')
    ));
    userSumCard.style.borderTop = '3px solid #10b981';
    const hasAnyUser = filtered.some(x => x.userPick);
    if (hasAnyUser) {
      const userRow = el('div', { className: 'grid grid-cols-3 gap-3' });
      [{ l:'Buy',c:userCounts.BUY,color:'text-emerald-600' },{ l:'Build',c:userCounts.BUILD,color:'text-blue-600' },{ l:'Partner',c:userCounts.PARTNER,color:'text-purple-600' }].forEach(s => {
        userRow.appendChild(el('div', { className: 'text-center' },
          el('p', { className: `text-2xl font-bold ${s.color}` }, String(s.c)),
          el('p', { className: 'text-[11px] text-slate-400 font-medium uppercase tracking-wider' }, s.l)
        ));
      });
      userSumCard.appendChild(userRow);
    } else {
      userSumCard.appendChild(el('p', { className: 'text-sm text-slate-400 text-center py-3' }, 'Click Buy, Build, or Partner below to make your decisions'));
    }
    summary.appendChild(userSumCard);
    tableWrap.appendChild(summary);

    if (filtered.length === 0) {
      tableWrap.appendChild(card(el('p', { className: 'text-gray-400 text-center py-8 text-sm' }, 'No vendors match the current filters.')));
      return;
    }

    // Cap rendered rows for performance
    const CAP = 100;
    const shown = filtered.slice(0, CAP);

    shown.forEach(({ v, dec, userPick }) => {
      const rowCard = card(
        el('div', { className: 'flex flex-col md:flex-row md:items-center gap-4' },
          // Vendor info + path scores
          el('div', { className: 'md:w-64 flex-shrink-0' },
            el('div', { className: 'flex items-center gap-2 mb-1' },
              el('a', { href: `#/vendors/${v.id}/edit`, className: 'font-semibold text-sm text-gray-900 hover:text-indigo-600 no-underline' }, v.name)
            ),
            v.category ? el('p', { className: 'text-[11px] text-indigo-500 font-medium' }, v.category) : null,
            v.project ? el('p', { className: 'text-xs text-slate-400 truncate' }, v.project) : null,
            dec ? el('div', { className: 'flex gap-2 mt-1.5' },
              el('span', { className: 'text-[10px] font-bold text-emerald-600' }, `B:${dec.raw.BUY}`),
              el('span', { className: 'text-[10px] font-bold text-blue-600' }, `Bd:${dec.raw.BUILD}`),
              el('span', { className: 'text-[10px] font-bold text-purple-600' }, `P:${dec.raw.PARTNER}`)
            ) : null
          ),
          // Framework recommendation
          el('div', { className: 'flex-1' },
            el('p', { className: 'text-[10px] text-indigo-400 font-semibold uppercase tracking-wider mb-1.5' }, 'Framework Recommends'),
            dec
              ? el('div', { className: 'flex items-center gap-2 flex-wrap' },
                  decisionBadge(dec.recommendation),
                  el('span', { className: 'text-xs text-slate-400' }, dec.confidence + '% confidence'),
                  el('span', { className: `text-[10px] px-2 py-0.5 rounded-full ${dec.source === 'user' ? 'bg-emerald-50 text-emerald-600' : 'bg-indigo-50 text-indigo-500'}` }, dec.source === 'user' ? 'your scores' : 'AI defaults')
                )
              : el('span', { className: 'text-xs text-slate-300' }, 'No scores')
          ),
          // User decision picker
          el('div', { className: 'flex-1' },
            el('p', { className: 'text-[10px] text-emerald-500 font-semibold uppercase tracking-wider mb-1.5' }, 'Your Decision'),
            Auth.canDecide()
              ? el('div', { className: 'flex gap-2' },
                  ...['BUY','BUILD','PARTNER'].map(choice => {
                    const colors = {
                      BUY: userPick === choice ? 'bg-emerald-500 text-white ring-2 ring-emerald-300 shadow-sm' : 'bg-white text-emerald-700 ring-1 ring-emerald-200 hover:bg-emerald-50',
                      BUILD: userPick === choice ? 'bg-blue-500 text-white ring-2 ring-blue-300 shadow-sm' : 'bg-white text-blue-700 ring-1 ring-blue-200 hover:bg-blue-50',
                      PARTNER: userPick === choice ? 'bg-purple-500 text-white ring-2 ring-purple-300 shadow-sm' : 'bg-white text-purple-700 ring-1 ring-purple-200 hover:bg-purple-50'
                    };
                    return el('button', {
                      className: `px-3 py-1.5 rounded-lg text-xs font-bold transition-all duration-200 ${colors[choice]}`,
                      onclick: () => {
                        if (userPick === choice) Store.clearUserDecision(v.id);
                        else Store.setUserDecision(v.id, choice);
                        renderTable();
                      }
                    }, choice);
                  })
                )
              : el('span', { className: 'text-xs text-slate-400' }, userPick || 'View only')
          ),
          // Match indicator
          el('div', { className: 'md:w-20 text-center flex-shrink-0' },
            dec && userPick
              ? dec.recommendation === userPick
                ? el('span', { className: 'text-xs font-bold text-emerald-500 bg-emerald-50 px-2.5 py-1 rounded-full' }, 'Aligned')
                : el('span', { className: 'text-xs font-bold text-amber-500 bg-amber-50 px-2.5 py-1 rounded-full' }, 'Differs')
              : el('span', { className: 'text-xs text-slate-300' }, '--')
          )
        )
      );
      tableWrap.appendChild(el('div', { className: 'mb-3' }, rowCard));
    });

    if (filtered.length > CAP) {
      tableWrap.appendChild(el('p', { className: 'text-sm text-slate-400 text-center py-3' }, `+${filtered.length - CAP} more vendors — refine filters to see them.`));
    }
  }
  renderTable();
}

// ── Login ─────────────────────────────────────────────────────────────
function renderLogin(root) {
  const form = { username: '', password: '' };
  const errEl = el('div', { className: 'text-red-500 text-sm mb-3 hidden' });

  function doLogin() {
    const result = Auth.login(form.username.trim(), form.password);
    if (result.ok) { location.hash = '#/'; render(); }
    else { errEl.textContent = result.error; errEl.className = 'text-red-500 text-sm mb-3'; }
  }

  const loginCard = el('div', { className: 'max-w-sm mx-auto', style: 'margin-top:20vh' },
    el('div', { className: 'text-center mb-8' },
      el('div', { className: 'w-14 h-14 rounded-2xl mx-auto mb-4 flex items-center justify-center', style: 'background:linear-gradient(135deg,#6366f1,#8b5cf6)' },
        (() => { const s = svg('M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z'); s.setAttribute('class','w-7 h-7 text-white'); return s; })()
      ),
      el('h1', { className: 'text-2xl font-bold text-gray-900' }, 'Vendor Matrix'),
      el('p', { className: 'text-sm text-gray-500 mt-1' }, 'Sign in to continue')
    ),
    el('div', { className: 'bg-white/80 backdrop-blur-sm rounded-2xl shadow-sm border border-white/60 p-6' },
      errEl,
      el('div', { className: 'space-y-4' },
        el('div', {},
          el('label', { className: 'block text-sm font-medium text-gray-700 mb-1' }, 'Username'),
          el('input', {
            type: 'text', placeholder: 'Enter username',
            className: 'w-full border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:ring-2 focus:ring-indigo-500/30 focus:border-indigo-400 outline-none bg-white/60 placeholder:text-slate-400',
            oninput: e => { form.username = e.target.value; }
          })
        ),
        el('div', {},
          el('label', { className: 'block text-sm font-medium text-gray-700 mb-1' }, 'Password'),
          (() => {
            const pw = el('input', {
              type: 'password', placeholder: 'Enter password',
              className: 'w-full border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:ring-2 focus:ring-indigo-500/30 focus:border-indigo-400 outline-none bg-white/60 placeholder:text-slate-400',
              oninput: e => { form.password = e.target.value; }
            });
            pw.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
            return pw;
          })()
        ),
        el('button', {
          className: 'w-full bg-gradient-to-r from-indigo-500 to-indigo-600 text-white px-5 py-2.5 rounded-xl hover:from-indigo-600 hover:to-indigo-700 font-semibold text-sm shadow-sm shadow-indigo-200 hover:shadow-md transition-all duration-200',
          onclick: doLogin
        }, 'Sign In')
      )
    ),
    el('p', { className: 'text-center text-xs text-slate-400 mt-4' }, 'Default credentials: admin / admin123')
  );
  root.appendChild(loginCard);
}

// ── User Management (Admin only) ──────────────────────────────────────
function renderUsers(root) {
  root.appendChild(el('div', { className: 'flex items-center justify-between mb-6' },
    el('div', {},
      el('h1', { className: 'text-2xl font-bold text-gray-900' }, 'User Management'),
      el('p', { className: 'text-gray-500 text-sm mt-1' }, 'Manage who can access the Vendor Matrix and what they can do')
    )
  ));

  // ── Add User Form ────────────────────────────────────────────────────
  const addForm = { username: '', displayName: '', role: 'viewer', password: '' };
  const errEl = el('div', { className: 'text-red-600 text-sm hidden' });
  const addCard = card(
    el('h2', { className: 'font-semibold text-gray-900 mb-4' }, 'Add New User'),
    el('div', { className: 'grid grid-cols-1 md:grid-cols-2 gap-4' },
      el('div', {},
        el('label', { className: 'block text-sm font-medium text-gray-700 mb-1' }, 'Username *'),
        el('input', {
          type: 'text', placeholder: 'e.g., jsmith',
          className: 'w-full border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:ring-2 focus:ring-indigo-500/30 focus:border-indigo-400 outline-none bg-white/60 placeholder:text-slate-400',
          oninput: e => { addForm.username = e.target.value; }
        })
      ),
      el('div', {},
        el('label', { className: 'block text-sm font-medium text-gray-700 mb-1' }, 'Display Name *'),
        el('input', {
          type: 'text', placeholder: 'e.g., John Smith',
          className: 'w-full border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:ring-2 focus:ring-indigo-500/30 focus:border-indigo-400 outline-none bg-white/60 placeholder:text-slate-400',
          oninput: e => { addForm.displayName = e.target.value; }
        })
      ),
      el('div', {},
        el('label', { className: 'block text-sm font-medium text-gray-700 mb-1' }, 'Role'),
        (() => {
          const sel = el('select', {
            className: 'w-full border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:ring-2 focus:ring-indigo-500/30 focus:border-indigo-400 outline-none bg-white/60',
            onchange: e => { addForm.role = e.target.value; }
          });
          Object.entries(ROLES).forEach(([key, r]) => {
            const opt = el('option', { value: key }, r.label + ' \u2014 ' + r.description);
            if (key === 'viewer') opt.selected = true;
            sel.appendChild(opt);
          });
          return sel;
        })()
      ),
      el('div', {},
        el('label', { className: 'block text-sm font-medium text-gray-700 mb-1' }, 'Password *'),
        el('input', {
          type: 'password', placeholder: 'Set password',
          className: 'w-full border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:ring-2 focus:ring-indigo-500/30 focus:border-indigo-400 outline-none bg-white/60 placeholder:text-slate-400',
          oninput: e => { addForm.password = e.target.value; }
        })
      )
    ),
    el('div', { className: 'mt-4 flex items-center gap-3' },
      el('button', {
        className: 'bg-gradient-to-r from-indigo-500 to-indigo-600 text-white px-5 py-2.5 rounded-xl hover:from-indigo-600 hover:to-indigo-700 font-semibold text-sm shadow-sm shadow-indigo-200 hover:shadow-md transition-all duration-200',
        onclick: () => {
          const username = cleanStr(addForm.username);
          const displayName = cleanStr(addForm.displayName);
          const password = addForm.password;
          if (!username) { errEl.textContent = 'Username required'; errEl.className = 'text-red-600 text-sm mt-3'; return; }
          if (!displayName) { errEl.textContent = 'Display name required'; errEl.className = 'text-red-600 text-sm mt-3'; return; }
          if (!password) { errEl.textContent = 'Password required'; errEl.className = 'text-red-600 text-sm mt-3'; return; }
          if (Store.getUserByUsername(username)) { errEl.textContent = 'Username already taken'; errEl.className = 'text-red-600 text-sm mt-3'; return; }
          Store.saveUser({ username, displayName, role: addForm.role, password });
          render();
        }
      }, '+ Add User'),
      errEl
    )
  );
  root.appendChild(addCard);

  // ── User List ────────────────────────────────────────────────────────
  const users = Store.getUsers();
  const currentUser = Auth.currentUser();
  const listCard = card(el('h2', { className: 'font-semibold text-gray-900 mb-4' }, 'All Users (' + users.length + ')'));
  if (users.length === 0) {
    listCard.appendChild(el('p', { className: 'text-gray-400 text-center py-6' }, 'No users.'));
  } else {
    const table = el('table', { className: 'w-full text-sm' });
    table.appendChild(el('thead', {},
      el('tr', { className: 'border-b border-gray-200' },
        el('th', { className: 'text-left py-3 px-2 font-medium text-gray-500' }, 'User'),
        el('th', { className: 'text-left py-3 px-2 font-medium text-gray-500' }, 'Username'),
        el('th', { className: 'text-left py-3 px-2 font-medium text-gray-500' }, 'Role'),
        el('th', { className: 'text-left py-3 px-2 font-medium text-gray-500' }, 'Created'),
        el('th', { className: 'text-right py-3 px-2 font-medium text-gray-500' }, 'Actions')
      )
    ));
    const tbody = el('tbody', {});
    users.forEach(u => {
      const isSelf = currentUser && currentUser.id === u.id;
      const roleBadge = { admin: 'bg-red-50 text-red-700 ring-1 ring-red-200', evaluator: 'bg-blue-50 text-blue-700 ring-1 ring-blue-200', viewer: 'bg-gray-100 text-gray-600 ring-1 ring-gray-200' };
      tbody.appendChild(el('tr', { className: 'border-b border-gray-50 hover:bg-gray-50' },
        el('td', { className: 'py-3 px-2' },
          el('div', { className: 'flex items-center gap-2' },
            el('div', { className: 'w-8 h-8 rounded-full bg-indigo-100 flex items-center justify-center flex-shrink-0' },
              el('span', { className: 'text-xs font-bold text-indigo-600' }, u.displayName.charAt(0).toUpperCase())
            ),
            el('span', { className: 'font-medium text-gray-900' }, u.displayName),
            isSelf ? el('span', { className: 'text-[10px] bg-indigo-50 text-indigo-600 px-1.5 py-0.5 rounded-full' }, 'you') : null
          )
        ),
        el('td', { className: 'py-3 px-2 text-gray-600' }, u.username),
        el('td', { className: 'py-3 px-2' },
          el('span', { className: 'px-2 py-0.5 rounded-full text-xs font-semibold ' + (roleBadge[u.role] || '') }, ROLES[u.role]?.label || u.role)
        ),
        el('td', { className: 'py-3 px-2 text-gray-400 text-xs' }, u.createdAt ? new Date(u.createdAt).toLocaleDateString() : '--'),
        el('td', { className: 'py-3 px-2 text-right' },
          el('div', { className: 'flex items-center justify-end gap-2' },
            (() => {
              const roleSel = el('select', {
                className: 'text-xs border border-slate-200 rounded-lg px-2 py-1 bg-white/60 outline-none',
                onchange: e => { Store.saveUser({ ...u, role: e.target.value }); render(); }
              });
              Object.entries(ROLES).forEach(([key, r]) => {
                const opt = el('option', { value: key }, r.label);
                if (u.role === key) opt.selected = true;
                roleSel.appendChild(opt);
              });
              return roleSel;
            })(),
            el('button', {
              className: 'text-xs text-indigo-600 hover:text-indigo-800',
              onclick: () => {
                const pw = prompt('Set new password for ' + u.displayName + ':');
                if (pw && pw.trim()) { Store.saveUser({ ...u, password: pw.trim() }); alert('Password updated.'); }
              }
            }, 'Reset PW'),
            !isSelf ? el('button', {
              className: 'text-xs text-gray-400 hover:text-red-600',
              onclick: () => { if (confirm('Delete user "' + u.displayName + '"?')) { Store.deleteUser(u.id); render(); } }
            }, 'Delete') : null
          )
        )
      ));
    });
    table.appendChild(tbody);
    listCard.appendChild(el('div', { className: 'overflow-x-auto' }, table));
  }
  root.appendChild(el('div', { className: 'mt-6' }, listCard));

  // ── Role Reference ───────────────────────────────────────────────────
  root.appendChild(el('div', { className: 'mt-6' }, card(
    el('h2', { className: 'font-semibold text-gray-900 mb-3' }, 'Role Permissions'),
    el('div', { className: 'space-y-3' },
      el('div', { className: 'p-3 rounded-xl bg-red-50/50 border border-red-100' },
        el('p', { className: 'text-sm font-semibold text-red-700' }, 'Admin'),
        el('p', { className: 'text-xs text-red-600/70' }, 'Full access: manage users, add/edit/delete vendors & campaigns, score vendors, make decisions')
      ),
      el('div', { className: 'p-3 rounded-xl bg-blue-50/50 border border-blue-100' },
        el('p', { className: 'text-sm font-semibold text-blue-700' }, 'Evaluator'),
        el('p', { className: 'text-xs text-blue-600/70' }, 'Score vendors and make Buy/Build/Partner decisions. Cannot add/edit/delete vendors, campaigns, or manage users')
      ),
      el('div', { className: 'p-3 rounded-xl bg-gray-50/50 border border-gray-200' },
        el('p', { className: 'text-sm font-semibold text-gray-700' }, 'Viewer'),
        el('p', { className: 'text-xs text-gray-500' }, 'View-only: browse dashboard, vendor list, comparisons, and campaigns. Cannot modify any data')
      )
    )
  )));
}
</script>
</body>
</html>
